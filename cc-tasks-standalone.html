<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Board - Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0f1117;
            --card: #1a1d2e;
            --border: rgba(255,255,255,0.1);
            --ember: #f97316;
            --purple: #8b5cf6;
            --cyan: #22d3ee;
            --gold: #fcd34d;
            --green: #4ade80;
            --red: #fb7185;
            --text: #f1f5f9;
            --muted: #c5ced6;
            --dim: #9dafc0;
            --accent-pro: rgba(139, 92, 246, 0.15);
            --accent-pers: rgba(236, 72, 153, 0.15);
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 430px;
            margin: 0 auto;
        }

        .hero {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
        }

        .hero-icon {
            font-size: 4rem;
            margin-bottom: 12px;
            animation: glowEmber 2s ease-in-out infinite;
        }

        @keyframes glowEmber {
            0%, 100% { text-shadow: 0 0 20px rgba(249, 115, 22, 0.4), 0 0 40px rgba(249, 115, 22, 0.2); }
            50% { text-shadow: 0 0 30px rgba(249, 115, 22, 0.6), 0 0 60px rgba(249, 115, 22, 0.3); }
        }

        .hero h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--ember) 0%, var(--purple) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .priority-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 32px;
        }

        .priority-card {
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            position: relative;
            overflow: hidden;
        }

        .priority-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, var(--purple) 0%, transparent 100%);
            opacity: 0;
            animation: borderDance 3s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes borderDance {
            0%, 100% { opacity: 0; }
            50% { opacity: 0.1; }
        }

        .priority-card-inner {
            position: relative;
            z-index: 1;
        }

        .priority-card.professional {
            border-color: rgba(139, 92, 246, 0.3);
        }

        .priority-card.personal {
            border-color: rgba(236, 72, 153, 0.3);
        }

        .priority-label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--muted);
            margin-bottom: 8px;
        }

        .priority-card.professional .priority-label {
            color: var(--purple);
        }

        .priority-card.personal .priority-label {
            color: #ec4899;
        }

        .priority-task {
            font-size: 0.95rem;
            font-weight: 500;
            margin-bottom: 4px;
            color: var(--text);
        }

        .priority-meta {
            font-size: 0.75rem;
            color: var(--dim);
        }

        .scope-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0;
        }

        .scope-tab {
            padding: 12px 20px;
            background: none;
            border: none;
            color: var(--dim);
            cursor: pointer;
            font-weight: 500;
            font-size: 0.9rem;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
            position: relative;
            bottom: -1px;
        }

        .scope-tab:hover {
            color: var(--text);
        }

        .scope-tab.active {
            color: var(--ember);
            border-bottom-color: var(--ember);
        }

        .controls-row {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            align-items: center;
        }

        .btn-filter {
            padding: 10px 16px;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-filter:hover {
            background: rgba(139, 92, 246, 0.1);
            border-color: var(--purple);
        }

        .btn-filter.active {
            background: rgba(139, 92, 246, 0.2);
            border-color: var(--purple);
            color: var(--purple);
        }

        .filters-panel {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
            display: none;
        }

        .filters-panel.active {
            display: block;
        }

        .filter-group {
            margin-bottom: 20px;
        }

        .filter-group:last-child {
            margin-bottom: 0;
        }

        .filter-label {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--muted);
            margin-bottom: 8px;
            display: block;
        }

        .filter-chips {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .filter-chip {
            padding: 8px 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: var(--dim);
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }

        .filter-chip:hover {
            background: rgba(255,255,255,0.08);
            border-color: var(--purple);
            color: var(--text);
        }

        .filter-chip.active {
            background: rgba(139, 92, 246, 0.3);
            border-color: var(--purple);
            color: var(--text);
        }

        .add-task-form {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 24px;
        }

        .form-row-main {
            display: flex;
            gap: 8px;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .form-input {
            flex: 1;
            padding: 12px 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
        }

        .form-input::placeholder {
            color: var(--dim);
        }

        .form-input:focus {
            outline: none;
            background: rgba(255,255,255,0.08);
            border-color: var(--purple);
        }

        .form-select {
            padding: 12px 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            min-width: 120px;
        }

        .form-select:focus {
            outline: none;
            background: rgba(255,255,255,0.08);
            border-color: var(--purple);
        }

        .btn {
            padding: 12px 20px;
            background: linear-gradient(135deg, var(--ember) 0%, var(--purple) 100%);
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(249, 115, 22, 0.3);
        }

        .btn-voice {
            padding: 12px 16px;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.2s ease;
        }

        .btn-voice.recording {
            background: rgba(251, 113, 133, 0.2);
            border-color: var(--red);
            color: var(--red);
            animation: pulseRed 1s ease-in-out infinite;
        }

        @keyframes pulseRed {
            0%, 100% { box-shadow: none; }
            50% { box-shadow: 0 0 12px rgba(251, 113, 133, 0.5); }
        }

        .btn-more {
            padding: 8px 12px;
            background: none;
            border: 1px solid var(--border);
            color: var(--dim);
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }

        .btn-more:hover {
            color: var(--text);
            border-color: var(--purple);
        }

        .btn-more.active {
            color: var(--purple);
            border-color: var(--purple);
        }

        .form-row-more {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
            display: none;
        }

        .form-row-more.active {
            display: grid;
        }

        .task-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }

        .task-item {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            position: relative;
            overflow: hidden;
            transition: all 0.2s ease;
        }

        .task-item:hover {
            border-color: var(--purple);
        }

        .task-item.done {
            opacity: 0.6;
        }

        .task-item.done .task-text {
            text-decoration: line-through;
            color: var(--dim);
        }

        .task-border-left {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--dim);
        }

        .task-item.urgent .task-border-left {
            background: var(--red);
        }

        .task-item.today .task-border-left {
            background: var(--gold);
        }

        .task-item.waiting .task-border-left {
            background: var(--cyan);
        }

        .task-item.someday .task-border-left {
            background: var(--purple);
        }

        .task-content {
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        .task-checkbox {
            width: 24px;
            height: 24px;
            min-width: 24px;
            margin-top: 2px;
            border-radius: 50%;
            border: 2px solid var(--border);
            background: transparent;
            cursor: pointer;
            transition: all 0.2s ease;
            appearance: none;
            flex-shrink: 0;
        }

        .task-checkbox:hover {
            border-color: var(--green);
        }

        .task-checkbox:checked {
            background: var(--green);
            border-color: var(--green);
        }

        .task-checkbox:checked::after {
            content: '✓';
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--bg);
            font-weight: bold;
            font-size: 0.9rem;
        }

        .task-info {
            flex: 1;
            min-width: 0;
        }

        .task-text {
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text);
            word-break: break-word;
        }

        .task-meta {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
            font-size: 0.8rem;
        }

        .task-cat-chip {
            padding: 4px 10px;
            background: rgba(139, 92, 246, 0.2);
            border-radius: 4px;
            color: var(--purple);
            font-weight: 500;
        }

        .task-cat-chip.email { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }
        .task-cat-chip.call { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .task-cat-chip.meeting { background: rgba(236, 72, 153, 0.2); color: #ec4899; }
        .task-cat-chip.research { background: rgba(139, 92, 246, 0.2); color: var(--purple); }
        .task-cat-chip.admin { background: rgba(107, 114, 128, 0.2); color: #d1d5db; }
        .task-cat-chip.followup { background: rgba(249, 115, 22, 0.2); color: var(--ember); }
        .task-cat-chip.health { background: rgba(74, 222, 128, 0.2); color: var(--green); }
        .task-cat-chip.personal { background: rgba(168, 85, 247, 0.2); color: #a855f7; }

        .task-flag {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            white-space: nowrap;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .task-flag.urgent {
            background: rgba(251, 113, 133, 0.2);
            color: var(--red);
        }

        .task-flag.today {
            background: rgba(252, 211, 77, 0.2);
            color: var(--gold);
        }

        .task-flag.waiting {
            background: rgba(34, 211, 238, 0.2);
            color: var(--cyan);
        }

        .task-flag.someday {
            background: rgba(139, 92, 246, 0.2);
            color: var(--purple);
        }

        .task-priority {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            white-space: nowrap;
        }

        .task-priority.high {
            background: rgba(251, 113, 133, 0.2);
            color: var(--red);
        }

        .task-priority.medium {
            background: rgba(252, 211, 77, 0.2);
            color: var(--gold);
        }

        .task-priority.low {
            background: rgba(34, 211, 238, 0.2);
            color: var(--cyan);
        }

        .task-actions {
            display: flex;
            gap: 8px;
            margin-left: auto;
            flex-shrink: 0;
            align-items: flex-start;
            padding-top: 2px;
        }

        .task-action-btn {
            width: 28px;
            height: 28px;
            padding: 0;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: var(--dim);
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            font-size: 0.9rem;
        }

        .task-action-btn:hover {
            background: rgba(139, 92, 246, 0.2);
            border-color: var(--purple);
            color: var(--text);
        }

        .inline-edit {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
            display: none;
        }

        .inline-edit.active {
            display: block;
        }

        .inline-edit-form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .inline-edit-full {
            grid-column: 1/-1;
        }

        .undo-toast {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            max-width: 400px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            z-index: 1000;
            animation: slideUp 0.3s ease;
            display: flex;
            gap: 12px;
            align-items: center;
            justify-content: space-between;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .undo-toast-msg {
            flex: 1;
            font-size: 0.9rem;
        }

        .undo-progress {
            width: 100%;
            height: 3px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 8px;
        }

        .undo-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--red), var(--ember));
            animation: undoCount 5s linear forwards;
        }

        @keyframes undoCount {
            from { width: 100%; }
            to { width: 0%; }
        }

        .sections {
            margin-bottom: 24px;
        }

        .section {
            margin-bottom: 20px;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 12px 0;
            user-select: none;
        }

        .section-header:hover {
            color: var(--text);
        }

        .section-arrow {
            display: inline-block;
            transition: transform 0.3s ease;
        }

        .section.collapsed .section-arrow {
            transform: rotate(-90deg);
        }

        .section-content {
            display: none;
        }

        .section.active .section-content {
            display: block;
        }

        .section-label {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text);
        }

        .section-count {
            font-size: 0.8rem;
            color: var(--dim);
            margin-left: auto;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--dim);
        }

        .empty-state-icon {
            font-size: 2.5rem;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        .empty-state-text {
            font-size: 0.95rem;
        }

        .toggles-footer {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .toggle-btn {
            padding: 10px 16px;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .toggle-btn:hover {
            background: rgba(139, 92, 246, 0.1);
            border-color: var(--purple);
        }

        .toggle-btn.active {
            background: rgba(139, 92, 246, 0.2);
            border-color: var(--purple);
            color: var(--purple);
        }

        .export-import {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
        }

        .export-import .btn {
            flex: 1;
        }

        @media (max-width: 640px) {
            .hero h1 {
                font-size: 1.8rem;
            }

            .priority-row {
                grid-template-columns: 1fr;
            }

            .form-row-main {
                flex-direction: column;
                gap: 12px;
            }

            .form-select {
                width: 100%;
            }

            .task-content {
                flex-direction: column;
            }

            .task-actions {
                margin-left: 32px;
            }

            .inline-edit-form {
                grid-template-columns: 1fr;
            }

            .scope-tabs {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }

            .scope-tab {
                white-space: nowrap;
                padding: 10px 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero" style="position:relative;">
            <a href="#" onclick="event.preventDefault();if(document.referrer&&document.referrer.indexOf(location.origin)>-1){history.back();}else{location.href='./index.html';}" style="position:absolute;left:0;top:50%;transform:translateY(-50%);color:var(--ember);font-size:14px;text-decoration:none;padding:4px 10px;border-radius:8px;background:rgba(249,115,22,.08);border:1px solid rgba(249,115,22,.15);">←</a>
            <div class="hero-icon">📋</div>
            <a href="./index.html" style="text-decoration:none;color:inherit;"><h1>Task Board</h1></a>
        </div>

        <div class="priority-row">
            <div class="priority-card professional">
                <div class="priority-card-inner">
                    <div class="priority-label">Professional</div>
                    <div class="priority-task" id="pro-top">Email Alex Albert follow-up</div>
                    <div class="priority-meta">High priority · Urgent</div>
                </div>
            </div>
            <div class="priority-card personal">
                <div class="priority-card-inner">
                    <div class="priority-label">Personal</div>
                    <div class="priority-task" id="pers-top">Schedule gym session</div>
                    <div class="priority-meta">Low priority · Today</div>
                </div>
            </div>
        </div>

        <div class="scope-tabs">
            <button class="scope-tab active" data-scope="all">All Tasks</button>
            <button class="scope-tab" data-scope="professional">Professional</button>
            <button class="scope-tab" data-scope="personal">Personal</button>
        </div>

        <div class="controls-row">
            <button class="btn-filter" id="filter-toggle">
                <span>⚙️ Filters</span>
                <span id="filter-arrow" style="display: inline-block;">▼</span>
            </button>
        </div>

        <div class="filters-panel" id="filters-panel">
            <div class="filter-group">
                <label class="filter-label">Timing Flags</label>
                <div class="filter-chips" id="timing-filters">
                    <button class="filter-chip active" data-filter-type="timing" data-filter="all">All</button>
                    <button class="filter-chip" data-filter-type="timing" data-filter="urgent">🔴 Urgent</button>
                    <button class="filter-chip" data-filter-type="timing" data-filter="today">☀️ Today</button>
                    <button class="filter-chip" data-filter-type="timing" data-filter="waiting">⏱ Waiting</button>
                    <button class="filter-chip" data-filter-type="timing" data-filter="someday">💭 Someday</button>
                </div>
            </div>

            <div class="filter-group">
                <label class="filter-label">Priority</label>
                <div class="filter-chips" id="priority-filters">
                    <button class="filter-chip active" data-filter-type="priority" data-filter="all">All</button>
                    <button class="filter-chip" data-filter-type="priority" data-filter="high">🔺 High</button>
                    <button class="filter-chip" data-filter-type="priority" data-filter="medium">🔸 Med</button>
                    <button class="filter-chip" data-filter-type="priority" data-filter="low">🔹 Low</button>
                </div>
            </div>

            <div class="filter-group">
                <label class="filter-label">Category</label>
                <div class="filter-chips" id="category-filters">
                    <button class="filter-chip active" data-filter-type="category" data-filter="all">All Types</button>
                    <button class="filter-chip" data-filter-type="category" data-filter="email">✉️ Email</button>
                    <button class="filter-chip" data-filter-type="category" data-filter="call">📞 Call</button>
                    <button class="filter-chip" data-filter-type="category" data-filter="meeting">🤝 Meeting</button>
                    <button class="filter-chip" data-filter-type="category" data-filter="research">🔍 Research</button>
                    <button class="filter-chip" data-filter-type="category" data-filter="admin">📎 Admin</button>
                    <button class="filter-chip" data-filter-type="category" data-filter="followup">🔄 Follow-up</button>
                    <button class="filter-chip" data-filter-type="category" data-filter="health">💪 Health</button>
                    <button class="filter-chip" data-filter-type="category" data-filter="personal">🏠 Personal</button>
                </div>
            </div>
        </div>

        <div class="add-task-form">
            <div class="form-row-main">
                <input type="text" class="form-input" id="task-input" placeholder="Add a new task...">
                <select class="form-select" id="task-scope">
                    <option value="professional">Professional</option>
                    <option value="personal">Personal</option>
                </select>
                <select class="form-select" id="task-category">
                    <option value="email">✉️ Email</option>
                    <option value="call">📞 Call</option>
                    <option value="meeting">🤝 Meeting</option>
                    <option value="research">🔍 Research</option>
                    <option value="admin">📎 Admin</option>
                    <option value="followup">🔄 Follow-up</option>
                    <option value="health">💪 Health</option>
                    <option value="personal">🏠 Personal</option>
                </select>
                <button class="btn" id="add-task-btn">Add</button>
                <button class="btn-voice" id="voice-btn" title="Record task">🎙️</button>
                <button class="btn-more" id="more-btn">+More</button>
            </div>

            <div class="form-row-more" id="form-more">
                <input type="date" class="form-input" id="task-due-date" placeholder="Due date">
                <input type="time" class="form-input" id="task-due-time" placeholder="Time">
                <select class="form-select" id="task-priority">
                    <option value="low">Low Priority</option>
                    <option value="medium" selected>Medium</option>
                    <option value="high">High Priority</option>
                </select>
                <select class="form-select" id="task-timing">
                    <option value="">No flag</option>
                    <option value="urgent">🔴 Urgent</option>
                    <option value="today">☀️ Today</option>
                    <option value="waiting">⏱ Waiting</option>
                    <option value="someday">💭 Someday</option>
                </select>
                <textarea class="form-input inline-edit-full" id="task-notes" placeholder="Notes (optional)" style="min-height: 60px; resize: vertical;"></textarea>
            </div>
        </div>

        <div class="task-list" id="task-list"></div>

        <div class="sections" id="sections"></div>

        <div class="toggles-footer">
            <button class="toggle-btn" id="show-completed-btn">Show Completed (0)</button>
            <button class="toggle-btn" id="show-deleted-btn">Show Deleted (0)</button>
        </div>

        <div class="export-import">
            <button class="btn" id="export-btn" style="flex: 1;">💾 Export</button>
            <button class="btn" id="import-btn" style="flex: 1;">📂 Import</button>
            <input type="file" id="import-file" accept=".json" style="display: none;">
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'cc_tasks_standalone';
        const CAT_EMOJIS = {
            email: '✉️',
            call: '📞',
            meeting: '🤝',
            research: '🔍',
            admin: '📎',
            followup: '🔄',
            health: '💪',
            personal: '🏠'
        };

        let state = {
            tasks: [],
            completed: [],
            deleted: [],
            scope: 'all',
            timing: 'all',
            priority: 'all',
            category: 'all',
            showCompleted: false,
            showDeleted: false,
            editingId: null,
            recording: false,
            recognition: null
        };

        // Sample data
        const SAMPLE_TASKS = [
            { id: 1, text: 'Email Alex Albert follow-up on LinkedIn DM', cat: 'email', scope: 'professional', timing: 'urgent', priority: 'high', meta: '', dueDate: '', dueTime: '' },
            { id: 2, text: 'Research Khan Academy Khanmigo program', cat: 'research', scope: 'professional', timing: 'today', priority: 'medium', meta: '', dueDate: '', dueTime: '' },
            { id: 3, text: 'Follow up with Drew Barksdale re: March 31 meeting', cat: 'followup', scope: 'professional', timing: 'today', priority: 'high', meta: '', dueDate: '', dueTime: '' },
            { id: 4, text: 'Schedule gym session - leg day', cat: 'health', scope: 'personal', timing: 'today', priority: 'low', meta: '', dueDate: '', dueTime: '' },
            { id: 5, text: 'Review Headspace job description and tailor resume', cat: 'research', scope: 'professional', timing: 'urgent', priority: 'high', meta: '', dueDate: '', dueTime: '' },
            { id: 6, text: 'Groceries for meal prep', cat: 'personal', scope: 'personal', timing: 'someday', priority: 'low', meta: '', dueDate: '', dueTime: '' }
        ];

        function initState() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                state = JSON.parse(saved);
            } else {
                state.tasks = [...SAMPLE_TASKS];
                saveState();
            }
        }

        function saveState() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }

        function addTask() {
            const text = document.getElementById('task-input').value.trim();
            if (!text) return;

            const scope = document.getElementById('task-scope').value;
            const category = document.getElementById('task-category').value;
            const priority = document.getElementById('task-priority').value;
            const timing = document.getElementById('task-timing').value;
            const dueDate = document.getElementById('task-due-date').value;
            const dueTime = document.getElementById('task-due-time').value;
            const meta = document.getElementById('task-notes').value.trim();

            const task = {
                id: Date.now(),
                text,
                scope,
                cat: category,
                priority,
                timing: timing || '',
                meta,
                dueDate,
                dueTime
            };

            state.tasks.push(task);
            saveState();
            render();

            document.getElementById('task-input').value = '';
            document.getElementById('task-due-date').value = '';
            document.getElementById('task-due-time').value = '';
            document.getElementById('task-notes').value = '';
            document.getElementById('task-priority').value = 'medium';
            document.getElementById('task-timing').value = '';
        }

        function toggleTask(id) {
            const idx = state.tasks.findIndex(t => t.id === id);
            if (idx >= 0) {
                const task = state.tasks[idx];
                state.tasks.splice(idx, 1);
                state.completed.push(task);
                saveState();
                render();
                showToast(`✓ Task completed`, 5);
            }
        }

        function deleteTask(id) {
            const idx = state.tasks.findIndex(t => t.id === id);
            if (idx >= 0) {
                const task = state.tasks[idx];
                state.tasks.splice(idx, 1);
                state.deleted.push({ task, deletedAt: Date.now() });
                saveState();
                render();
                showUndoToast(id, task);
            }
        }

        function undoDelete(id) {
            const idx = state.deleted.findIndex(d => d.task.id === id);
            if (idx >= 0) {
                const { task } = state.deleted[idx];
                state.deleted.splice(idx, 1);
                state.tasks.push(task);
                saveState();
                render();
            }
        }

        function restoreCompleted(id) {
            const idx = state.completed.findIndex(t => t.id === id);
            if (idx >= 0) {
                const task = state.completed[idx];
                state.completed.splice(idx, 1);
                state.tasks.push(task);
                saveState();
                render();
            }
        }

        function showUndoToast(id, task) {
            const existing = document.getElementById('undo-toast');
            if (existing) existing.remove();

            const toast = document.createElement('div');
            toast.id = 'undo-toast';
            toast.className = 'undo-toast';
            toast.innerHTML = `
                <div class="undo-toast-msg">Deleted: "${task.text.substring(0, 40)}..."
                    <div class="undo-progress">
                        <div class="undo-progress-fill"></div>
                    </div>
                </div>
                <button style="background: none; border: none; color: var(--cyan); cursor: pointer; font-weight: 600; font-size: 0.9rem;">Undo</button>
            `;
            document.body.appendChild(toast);
            const undoBtn = toast.querySelector('button');
            undoBtn.onclick = () => {
                undoDelete(id);
                toast.remove();
            };

            setTimeout(() => toast.remove(), 5000);
        }

        function showToast(msg, duration = 3) {
            const existing = document.getElementById('success-toast');
            if (existing) existing.remove();

            const toast = document.createElement('div');
            toast.id = 'success-toast';
            toast.className = 'undo-toast';
            toast.style.backgroundColor = 'rgba(74, 222, 128, 0.15)';
            toast.style.borderColor = 'var(--green)';
            toast.innerHTML = `<div style="color: var(--green); font-weight: 500;">${msg}</div>`;
            document.body.appendChild(toast);

            setTimeout(() => toast.remove(), duration * 1000);
        }

        function getFilteredTasks() {
            return state.tasks.filter(task => {
                if (state.scope !== 'all' && task.scope !== state.scope) return false;
                if (state.timing !== 'all' && task.timing !== state.timing) return false;
                if (state.priority !== 'all' && task.priority !== state.priority) return false;
                if (state.category !== 'all' && task.cat !== state.category) return false;
                return true;
            });
        }

        function buildTaskHtml(task, isCompleted = false) {
            const categoryName = {
                email: 'Email',
                call: 'Call',
                meeting: 'Meeting',
                research: 'Research',
                admin: 'Admin',
                followup: 'Follow-up',
                health: 'Health',
                personal: 'Personal'
            }[task.cat] || 'Task';

            const priorityLabel = { high: 'High', medium: 'Medium', low: 'Low' }[task.priority] || 'Medium';
            const timingLabel = { urgent: 'Urgent', today: 'Today', waiting: 'Waiting', someday: 'Someday' }[task.timing] || '';

            let html = `
                <div class="task-item ${isCompleted ? 'done' : ''} ${task.timing || 'none'}" data-id="${task.id}">
                    <div class="task-border-left"></div>
                    <div class="task-content">
                        <input type="checkbox" class="task-checkbox" ${isCompleted ? 'checked' : ''} onchange="toggleTask(${task.id})">
                        <div class="task-info">
                            <div class="task-text">${escapeHtml(task.text)}</div>
                            <div class="task-meta">
                                <span class="task-cat-chip ${task.cat}">${CAT_EMOJIS[task.cat]} ${categoryName}</span>
                                ${timingLabel ? `<span class="task-flag ${task.timing}">${timingLabel}</span>` : ''}
                                <span class="task-priority ${task.priority}">${priorityLabel}</span>
                                ${task.dueDate ? `<span style="color: var(--dim); font-size: 0.8rem;">📅 ${task.dueDate}</span>` : ''}
                            </div>
                        </div>
                        <div class="task-actions">
                            <button class="task-action-btn" onclick="toggleEdit(${task.id})" title="Edit">✏️</button>
                            <button class="task-action-btn" onclick="deleteTask(${task.id})" title="Delete">🗑</button>
                        </div>
                    </div>
                    ${state.editingId === task.id ? buildEditForm(task) : ''}
                </div>
            `;
            return html;
        }

        function buildEditForm(task) {
            return `
                <div class="inline-edit active">
                    <div class="inline-edit-form">
                        <input type="text" class="form-input" value="${escapeHtml(task.text)}" onchange="updateTaskField(${task.id}, 'text', this.value)">
                        <select class="form-select" onchange="updateTaskField(${task.id}, 'scope', this.value)">
                            <option value="professional" ${task.scope === 'professional' ? 'selected' : ''}>Professional</option>
                            <option value="personal" ${task.scope === 'personal' ? 'selected' : ''}>Personal</option>
                        </select>
                        <select class="form-select" onchange="updateTaskField(${task.id}, 'cat', this.value)">
                            <option value="email" ${task.cat === 'email' ? 'selected' : ''}>Email</option>
                            <option value="call" ${task.cat === 'call' ? 'selected' : ''}>Call</option>
                            <option value="meeting" ${task.cat === 'meeting' ? 'selected' : ''}>Meeting</option>
                            <option value="research" ${task.cat === 'research' ? 'selected' : ''}>Research</option>
                            <option value="admin" ${task.cat === 'admin' ? 'selected' : ''}>Admin</option>
                            <option value="followup" ${task.cat === 'followup' ? 'selected' : ''}>Follow-up</option>
                            <option value="health" ${task.cat === 'health' ? 'selected' : ''}>Health</option>
                            <option value="personal" ${task.cat === 'personal' ? 'selected' : ''}>Personal</option>
                        </select>
                        <select class="form-select" onchange="updateTaskField(${task.id}, 'priority', this.value)">
                            <option value="low" ${task.priority === 'low' ? 'selected' : ''}>Low</option>
                            <option value="medium" ${task.priority === 'medium' ? 'selected' : ''}>Medium</option>
                            <option value="high" ${task.priority === 'high' ? 'selected' : ''}>High</option>
                        </select>
                        <select class="form-select" onchange="updateTaskField(${task.id}, 'timing', this.value)">
                            <option value="" ${!task.timing ? 'selected' : ''}>No flag</option>
                            <option value="urgent" ${task.timing === 'urgent' ? 'selected' : ''}>Urgent</option>
                            <option value="today" ${task.timing === 'today' ? 'selected' : ''}>Today</option>
                            <option value="waiting" ${task.timing === 'waiting' ? 'selected' : ''}>Waiting</option>
                            <option value="someday" ${task.timing === 'someday' ? 'selected' : ''}>Someday</option>
                        </select>
                        <textarea class="form-input inline-edit-full" onchange="updateTaskField(${task.id}, 'meta', this.value)" style="min-height: 60px; resize: vertical;">${escapeHtml(task.meta)}</textarea>
                    </div>
                    <button class="btn" style="margin-top: 12px; width: 100%;" onclick="toggleEdit(${task.id})">Done</button>
                </div>
            `;
        }

        function toggleEdit(id) {
            if (state.editingId === id) {
                state.editingId = null;
            } else {
                state.editingId = id;
            }
            render();
        }

        function updateTaskField(id, field, value) {
            const task = state.tasks.find(t => t.id === id);
            if (task) {
                task[field] = value;
                saveState();
            }
        }

        function escapeHtml(text) {
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        function render() {
            const filtered = getFilteredTasks();
            const list = document.getElementById('task-list');
            list.innerHTML = filtered.map(t => buildTaskHtml(t)).join('');

            // Update priority cards
            const proTasks = state.tasks.filter(t => t.scope === 'professional' && (t.timing === 'urgent' || t.timing === 'today'));
            const persTasks = state.tasks.filter(t => t.scope === 'personal' && (t.timing === 'urgent' || t.timing === 'today'));

            if (proTasks.length > 0) {
                document.getElementById('pro-top').textContent = proTasks[0].text.substring(0, 50);
            }
            if (persTasks.length > 0) {
                document.getElementById('pers-top').textContent = persTasks[0].text.substring(0, 50);
            }

            // Sections
            const sections = document.getElementById('sections');
            sections.innerHTML = '';

            if (state.showCompleted && state.completed.length > 0) {
                const section = document.createElement('div');
                section.className = 'section active';
                section.innerHTML = `
                    <div class="section-header" onclick="toggleSection(this)">
                        <span class="section-arrow">▼</span>
                        <span class="section-label">✓ Completed</span>
                        <span class="section-count">${state.completed.length}</span>
                    </div>
                    <div class="section-content">
                        ${state.completed.map(t => buildTaskHtml(t, true)).join('')}
                    </div>
                `;
                sections.appendChild(section);
            }

            if (state.showDeleted && state.deleted.length > 0) {
                const section = document.createElement('div');
                section.className = 'section active';
                section.innerHTML = `
                    <div class="section-header" onclick="toggleSection(this)">
                        <span class="section-arrow">▼</span>
                        <span class="section-label">🗑 Deleted</span>
                        <span class="section-count">${state.deleted.length}</span>
                    </div>
                    <div class="section-content">
                        ${state.deleted.map(d => `
                            <div class="task-item" style="opacity: 0.6;">
                                <div class="task-border-left"></div>
                                <div class="task-content">
                                    <div class="task-info">
                                        <div class="task-text" style="text-decoration: line-through;">${escapeHtml(d.task.text)}</div>
                                    </div>
                                    <button class="task-action-btn" onclick="undoDelete(${d.task.id})" title="Restore">↺</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                sections.appendChild(section);
            }

            // Update toggle buttons
            document.getElementById('show-completed-btn').textContent = `Show Completed (${state.completed.length})`;
            document.getElementById('show-completed-btn').classList.toggle('active', state.showCompleted);
            document.getElementById('show-deleted-btn').textContent = `Show Deleted (${state.deleted.length})`;
            document.getElementById('show-deleted-btn').classList.toggle('active', state.showDeleted);
        }

        function toggleSection(header) {
            const section = header.closest('.section');
            section.classList.toggle('collapsed');
            section.classList.toggle('active');
        }

        function setupEventListeners() {
            document.getElementById('add-task-btn').addEventListener('click', addTask);
            document.getElementById('task-input').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') addTask();
            });

            document.getElementById('filter-toggle').addEventListener('click', () => {
                document.getElementById('filters-panel').classList.toggle('active');
                const arrow = document.getElementById('filter-arrow');
                arrow.textContent = document.getElementById('filters-panel').classList.contains('active') ? '▲' : '▼';
            });

            document.querySelectorAll('.scope-tab').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.scope-tab').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    state.scope = btn.dataset.scope;
                    render();
                });
            });

            document.querySelectorAll('.filter-chip').forEach(btn => {
                btn.addEventListener('click', () => {
                    const type = btn.dataset.filterType;
                    const value = btn.dataset.filter;

                    document.querySelectorAll(`[data-filter-type="${type}"]`).forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');

                    if (type === 'timing') state.timing = value;
                    if (type === 'priority') state.priority = value;
                    if (type === 'category') state.category = value;
                    render();
                });
            });

            document.getElementById('show-completed-btn').addEventListener('click', () => {
                state.showCompleted = !state.showCompleted;
                render();
            });

            document.getElementById('show-deleted-btn').addEventListener('click', () => {
                state.showDeleted = !state.showDeleted;
                render();
            });

            document.getElementById('more-btn').addEventListener('click', () => {
                document.getElementById('form-more').classList.toggle('active');
                document.getElementById('more-btn').classList.toggle('active');
            });

            document.getElementById('voice-btn').addEventListener('click', setupVoiceInput);

            document.getElementById('export-btn').addEventListener('click', exportData);
            document.getElementById('import-btn').addEventListener('click', () => {
                document.getElementById('import-file').click();
            });
            document.getElementById('import-file').addEventListener('change', importData);
        }

        function setupVoiceInput() {
            const btn = document.getElementById('voice-btn');
            const SpeechRecognition = window.webkitSpeechRecognition || window.SpeechRecognition;

            if (!SpeechRecognition) {
                alert('Speech recognition not supported in this browser');
                return;
            }

            if (state.recording) {
                state.recording = false;
                if (state.recognition) state.recognition.stop();
                btn.classList.remove('recording');
                btn.innerHTML = '🎙️';
                return;
            }

            state.recording = true;
            btn.classList.add('recording');
            btn.innerHTML = '🔴';

            state.recognition = new SpeechRecognition();
            state.recognition.continuous = false;
            state.recognition.interimResults = true;

            state.recognition.onresult = (e) => {
                let transcript = '';
                for (let i = e.resultIndex; i < e.results.length; i++) {
                    transcript += e.results[i][0].transcript;
                }
                document.getElementById('task-input').value = transcript;
            };

            state.recognition.onend = () => {
                state.recording = false;
                btn.classList.remove('recording');
                btn.innerHTML = '🎙️';
            };

            state.recognition.start();
        }

        function exportData() {
            const data = {
                tasks: state.tasks,
                completed: state.completed,
                deleted: state.deleted,
                exportedAt: new Date().toISOString()
            };
            const json = JSON.stringify(data, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `tasks-backup-${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('📥 Tasks exported successfully');
        }

        function importData(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const data = JSON.parse(event.target.result);
                    state.tasks = data.tasks || [];
                    state.completed = data.completed || [];
                    state.deleted = data.deleted || [];
                    saveState();
                    render();
                    showToast('📤 Tasks imported successfully');
                } catch (err) {
                    alert('Error importing file: ' + err.message);
                }
            };
            reader.readAsText(file);
            e.target.value = '';
        }

        // ── SMART SUITE SYNC ──
        var SYNC_KEY = 'smart_suite_sync';
        function readSync() { try { return JSON.parse(localStorage.getItem(SYNC_KEY)) || {}; } catch(e) { return {}; } }
        function writeSync(data) { var d = readSync(); var t = d.tasks || {}; Object.assign(t, data); d.tasks = t; localStorage.setItem(SYNC_KEY, JSON.stringify(d)); }
        function syncToCC(eventType, data) {
            try {
                var events = JSON.parse(localStorage.getItem('cc_app_events') || '[]');
                events.unshift({ app: 'tasks', type: eventType, data: data, ts: new Date().toISOString() });
                if (events.length > 50) events = events.slice(0, 50);
                localStorage.setItem('cc_app_events', JSON.stringify(events));
            } catch(e) {}
        }
        function refreshSuiteSync() {
            var active = state.tasks ? state.tasks.filter(function(t) { return !t.done; }).length : 0;
            var done = state.completed ? state.completed.length : 0;
            writeSync({
                activeTasks: active,
                completedTasks: done,
                lastDate: new Date().toISOString().split('T')[0]
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            initState();
            setupEventListeners();
            render();
            refreshSuiteSync();
        });
    </script>
</body>
</html>
