<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0a18">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Reading Companion">
    <title>Reading Companion</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0f0d0a;
            --card: #1a1714;
            --card-raised: #221f1a;
            --border: rgba(210,180,140,.12);
            --border-warm: rgba(210,180,140,.25);
            --text: #ede6db;
            --dim: rgba(237,230,219,.45);
            --accent: #d4a574;
            --accent-bright: #e8c9a0;
            --green: #6bcb77;
            --gold: #f0c040;
            --red: #e74c4c;
            --teal: #4dd0b8;
            --paper: #f5eed8;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Georgia', 'Palatino Linotype', 'Book Antiqua', serif;
            line-height: 1.7;
            overflow-x: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            max-width: 430px;
            margin: 0 auto;
        }
        .header {
            padding: 1rem 1.2rem;
            background: linear-gradient(135deg, #1a0f06 0%, #2a1a0e 40%, #0f1a1a 100%);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border-warm);
            position: relative;
            overflow: hidden;
        }
        .header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: url("data:image/svg+xml,%3Csvg width='40' height='40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 20h40M20 0v40' stroke='rgba(210,180,140,0.04)' stroke-width='1'/%3E%3C/svg%3E");
            pointer-events: none;
        }
        .header h1 {
            font-size: 1.25rem;
            font-weight: 700;
            font-family: 'Georgia', serif;
            letter-spacing: 0.02em;
            color: var(--accent-bright);
            position: relative;
        }
        .header-controls {
            display: flex;
            gap: 0.5rem;
            position: relative;
        }
        .btn-icon {
            background: rgba(212,165,116,.1);
            border: 1px solid var(--border-warm);
            color: var(--accent);
            width: 36px;
            height: 36px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            transition: all 0.2s;
        }
        .btn-icon:hover {
            background: rgba(212,165,116,.2);
            transform: scale(1.05);
            box-shadow: 0 0 12px rgba(212,165,116,.15);
        }
        .main {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            display: flex;
            background: radial-gradient(ellipse at 50% 0%, rgba(212,165,116,.03) 0%, transparent 70%);
        }
        .view {
            display: none;
            width: 100%;
            padding: 0.8rem;
            animation: fadeSlide 0.4s ease-out;
        }
        .view.active {
            display: flex;
            flex-direction: column;
            animation: fadeSlide 0.4s ease-out;
        }
        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .view-container {
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
        }
        .nav {
            display: flex;
            gap: 0;
            border-top: 2px solid var(--border-warm);
            background: linear-gradient(180deg, var(--card) 0%, #0f0d0a 100%);
            padding: 0;
        }
        .nav-item {
            flex: 1;
            padding: 0.45rem 0.1rem;
            text-align: center;
            cursor: pointer;
            border: none;
            background: transparent;
            color: var(--dim);
            font-size: 0.58rem;
            font-family: -apple-system, sans-serif;
            font-weight: 600;
            transition: all 0.25s;
            border-top: 3px solid transparent;
            letter-spacing: 0.01em;
            line-height: 1.3;
        }
        .nav-item.active {
            color: var(--accent-bright);
            border-top-color: var(--accent);
            background: rgba(212,165,116,.05);
        }
        .nav-item:hover {
            color: var(--accent);
        }
        /* BOOK CARDS */
        .book-card {
            background: linear-gradient(145deg, var(--card) 0%, var(--card-raised) 100%);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 1rem;
            margin-bottom: 0.8rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(.4,0,.2,1);
            position: relative;
            overflow: hidden;
        }
        .book-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent) 0%, var(--gold) 50%, var(--teal) 100%);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .book-card:hover {
            border-color: var(--border-warm);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,.3), 0 0 20px rgba(212,165,116,.06);
        }
        .book-card:hover::before { opacity: 1; }
        .book-card-header {
            display: flex;
            gap: 0.9rem;
            margin-bottom: 0.6rem;
        }
        .book-cover {
            width: 56px;
            height: 84px;
            background: linear-gradient(145deg, #2a1a0e 0%, #1a0f06 100%);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            flex-shrink: 0;
            overflow: hidden;
            box-shadow: 3px 3px 8px rgba(0,0,0,.4), -1px -1px 3px rgba(212,165,116,.05);
            border: 1px solid rgba(210,180,140,.15);
        }
        .book-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .book-info { flex: 1; }
        .book-title {
            font-size: 0.95rem;
            font-weight: 700;
            margin-bottom: 0.15rem;
            color: var(--text);
            font-family: 'Georgia', serif;
        }
        .book-author {
            font-size: 0.8rem;
            color: var(--accent);
            margin-bottom: 0.4rem;
            font-style: italic;
        }
        .status-pill {
            display: inline-block;
            padding: 0.22rem 0.6rem;
            border-radius: 10px;
            font-size: 0.62rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            font-family: -apple-system, sans-serif;
        }
        .status-pill.reading {
            background: rgba(107,203,119,.12);
            color: var(--green);
            border: 1px solid rgba(107,203,119,.25);
        }
        .status-pill.to-read {
            background: rgba(212,165,116,.1);
            color: var(--accent);
            border: 1px solid rgba(212,165,116,.2);
        }
        .status-pill.done {
            background: rgba(77,208,184,.1);
            color: var(--teal);
            border: 1px solid rgba(77,208,184,.2);
        }
        .status-pill.dnf {
            background: rgba(231,76,76,.1);
            color: var(--red);
            border: 1px solid rgba(231,76,76,.2);
        }
        .progress-bar {
            width: 100%;
            height: 5px;
            background: rgba(212,165,116,.08);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 0.4rem;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent) 0%, var(--gold) 60%, var(--teal) 100%);
            border-radius: 3px;
            transition: width 0.5s cubic-bezier(.4,0,.2,1);
            position: relative;
        }
        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,.15) 50%, transparent 100%);
            animation: shimmer 2.5s infinite;
        }
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        /* BUTTONS */
        .btn {
            background: linear-gradient(135deg, var(--accent) 0%, #c4915e 100%);
            color: var(--bg);
            border: none;
            border-radius: 10px;
            padding: 0.65rem 1.2rem;
            font-size: 0.88rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s;
            font-family: -apple-system, sans-serif;
            letter-spacing: 0.02em;
            box-shadow: 0 2px 8px rgba(212,165,116,.2);
        }
        .btn:hover {
            transform: translateY(-1px) scale(1.01);
            box-shadow: 0 4px 16px rgba(212,165,116,.3);
        }
        .btn-secondary {
            background: rgba(212,165,116,.08);
            border: 1px solid var(--border-warm);
            color: var(--accent);
            box-shadow: none;
        }
        .btn-secondary:hover {
            background: rgba(212,165,116,.15);
        }
        .btn-small {
            padding: 0.4rem 0.8rem;
            font-size: 0.78rem;
        }
        /* FORMS */
        .form-group { margin-bottom: 1rem; }
        label {
            display: block;
            font-size: 0.82rem;
            font-weight: 700;
            margin-bottom: 0.35rem;
            color: var(--accent);
            font-family: -apple-system, sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        input, textarea, select {
            width: 100%;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.6rem;
            color: var(--text);
            font-family: 'Georgia', serif;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(212,165,116,.04);
            box-shadow: 0 0 12px rgba(212,165,116,.08);
        }
        textarea { resize: vertical; min-height: 80px; }
        .section-title {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--accent);
            margin: 1.4rem 0 0.8rem 0;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border-warm);
            font-family: -apple-system, sans-serif;
        }
        /* STATS */
        .stat-box {
            background: linear-gradient(145deg, var(--card) 0%, var(--card-raised) 100%);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 0.6rem;
            text-align: center;
            transition: all 0.2s;
        }
        .stat-box:hover {
            border-color: var(--border-warm);
            box-shadow: 0 4px 12px rgba(0,0,0,.2);
        }
        .stat-number {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--accent-bright);
            font-family: 'Georgia', serif;
        }
        .stat-label {
            font-size: 0.72rem;
            color: var(--dim);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-top: 0.3rem;
            font-family: -apple-system, sans-serif;
        }
        /* JOURNAL */
        .entry-card {
            background: var(--card);
            border-left: 3px solid var(--accent);
            border-radius: 0 10px 10px 0;
            padding: 0.8rem;
            margin-bottom: 0.7rem;
            transition: all 0.2s;
        }
        .entry-card:hover {
            background: var(--card-raised);
            border-left-color: var(--gold);
        }
        .entry-meta {
            font-size: 0.72rem;
            color: var(--dim);
            margin-bottom: 0.35rem;
            font-family: -apple-system, sans-serif;
        }
        .entry-text {
            font-size: 0.92rem;
            line-height: 1.65;
            font-family: 'Georgia', serif;
        }
        .quote-text {
            font-style: italic;
            color: var(--accent-bright);
            margin: 0.4rem 0;
            border-left: 2px solid var(--accent);
            padding-left: 0.8rem;
            font-family: 'Georgia', serif;
        }
        /* MODAL */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,.75);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: linear-gradient(180deg, var(--card-raised) 0%, var(--card) 100%);
            border: 1px solid var(--border-warm);
            border-radius: 16px;
            padding: 1.5rem;
            max-width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            animation: slideUp 0.35s cubic-bezier(.4,0,.2,1);
            box-shadow: 0 16px 40px rgba(0,0,0,.5);
        }
        @keyframes slideUp {
            from { transform: translateY(20px) scale(0.98); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }
        .modal-close {
            float: right;
            font-size: 1.4rem;
            cursor: pointer;
            color: var(--dim);
            border: none;
            background: none;
            transition: all 0.2s;
        }
        .modal-close:hover { color: var(--accent); transform: scale(1.1); }
        /* GAMES */
        .game-screen { display: flex; flex-direction: column; gap: 1rem; }
        .question-box {
            background: rgba(212,165,116,.06);
            border: 1px solid var(--border-warm);
            border-radius: 12px;
            padding: 1.2rem;
            margin-bottom: 1rem;
            position: relative;
        }
        .question-box::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent), var(--gold), var(--teal));
            border-radius: 12px 12px 0 0;
        }
        .question-text { font-size: 1.05rem; font-weight: 600; margin-bottom: 1rem; }
        .options { display: flex; flex-direction: column; gap: 0.5rem; }
        .option-btn {
            background: rgba(212,165,116,.04);
            border: 1px solid var(--border);
            padding: 0.75rem;
            border-radius: 10px;
            color: var(--text);
            cursor: pointer;
            text-align: left;
            transition: all 0.25s;
            font-size: 0.9rem;
            font-family: 'Georgia', serif;
        }
        .option-btn:hover {
            border-color: var(--accent);
            background: rgba(212,165,116,.1);
            transform: translateX(4px);
        }
        .option-btn.correct {
            background: rgba(107,203,119,.12);
            border-color: var(--green);
            color: var(--green);
        }
        .option-btn.incorrect {
            background: rgba(231,76,76,.12);
            border-color: var(--red);
            color: var(--red);
        }
        .xp-badge {
            display: inline-block;
            background: linear-gradient(135deg, var(--gold) 0%, #d4a020 100%);
            color: var(--bg);
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            font-size: 0.68rem;
            font-weight: 800;
            margin-left: 0.4rem;
            font-family: -apple-system, sans-serif;
            box-shadow: 0 2px 6px rgba(240,192,64,.25);
        }
        .back-button {
            color: var(--accent);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.95rem;
            padding: 0.4rem;
            transition: all 0.2s;
            font-family: -apple-system, sans-serif;
        }
        .back-button:hover { color: var(--accent-bright); transform: translateX(-2px); }
        /* DETAIL VIEW */
        .detail-header {
            display: flex;
            align-items: flex-start;
            gap: 1.2rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-warm);
        }
        .detail-cover {
            width: 80px;
            height: 120px;
            background: linear-gradient(145deg, #2a1a0e 0%, #1a0f06 100%);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            flex-shrink: 0;
            overflow: hidden;
            box-shadow: 4px 4px 12px rgba(0,0,0,.5), -1px -1px 4px rgba(212,165,116,.08);
            border: 1px solid rgba(210,180,140,.15);
        }
        .detail-cover img { width: 100%; height: 100%; object-fit: cover; }
        .detail-info h2 { font-size: 1.2rem; margin-bottom: 0.3rem; font-family: 'Georgia', serif; }
        .detail-info p { font-size: 0.88rem; color: var(--dim); margin-bottom: 0.4rem; }
        /* VOCAB */
        .word-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.9rem;
            margin-bottom: 0.7rem;
            cursor: pointer;
            transition: all 0.25s;
        }
        .word-card:hover {
            border-color: var(--accent);
            box-shadow: 0 2px 8px rgba(212,165,116,.08);
        }
        .word-card.flipped {
            background: rgba(212,165,116,.06);
            border-color: var(--accent);
        }
        .word-term {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--accent-bright);
            margin-bottom: 0.3rem;
            font-family: 'Georgia', serif;
        }
        .word-definition {
            font-size: 0.88rem;
            color: var(--text);
            line-height: 1.55;
        }
        .game-timer { font-size: 1.2rem; font-weight: 700; color: var(--gold); }
        /* CASE STUDY */
        .case-study {
            background: rgba(240,192,64,.04);
            border: 1px solid rgba(240,192,64,.2);
            border-left: 4px solid var(--gold);
            border-radius: 0 12px 12px 0;
            padding: 1rem;
            margin-bottom: 0.7rem;
        }
        .case-study-title { font-size: 0.92rem; font-weight: 700; color: var(--gold); margin-bottom: 0.4rem; }
        .case-study-text { font-size: 0.9rem; line-height: 1.55; margin-bottom: 0.6rem; }
        .recommendation {
            background: rgba(107,203,119,.06);
            border: 1px solid rgba(107,203,119,.2);
            border-radius: 8px;
            padding: 0.8rem;
            margin-top: 0.8rem;
            font-size: 0.9rem;
        }
        .achievement { text-align: center; animation: bounce 0.6s ease-out; }
        @keyframes bounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }
        .emoji-burst {
            position: fixed;
            font-size: 2rem;
            pointer-events: none;
            animation: float-up 2s ease-out forwards;
        }
        @keyframes float-up {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-120px) scale(0.4); opacity: 0; }
        }
        /* BOOKSHELF */
        .shelf-row {
            position: relative;
            display: flex;
            align-items: flex-end;
            gap: 10px;
            padding: 12px 14px 0;
            min-height: 140px;
            margin-bottom: 0;
        }
        .shelf-plank {
            position: relative;
            height: 14px;
            background: linear-gradient(180deg, #5c3d2e 0%, #3e2a1e 40%, #2a1a10 100%);
            border-radius: 0 0 3px 3px;
            box-shadow: 0 4px 12px rgba(0,0,0,.5), 0 2px 4px rgba(0,0,0,.3), inset 0 1px 0 rgba(210,180,140,.15);
            margin: 0 -2px;
        }
        .shelf-plank::after {
            content: '';
            position: absolute;
            top: 0; left: 8px; right: 8px;
            height: 1px;
            background: rgba(210,180,140,.12);
        }
        .shelf-label {
            font-size: 0.62rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--accent);
            font-family: -apple-system, sans-serif;
            padding: 0.8rem 0.8rem 0.3rem;
        }
        .spine {
            cursor: pointer;
            transition: all 0.3s cubic-bezier(.4,0,.2,1);
            position: relative;
            flex-shrink: 0;
        }
        .spine:hover {
            transform: translateY(-8px) scale(1.03);
            z-index: 2;
        }
        .spine:hover .spine-glow {
            opacity: 1;
        }
        .spine-glow {
            position: absolute;
            bottom: -4px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 8px;
            background: radial-gradient(ellipse, rgba(212,165,116,.3), transparent);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .spine img {
            display: block;
            border-radius: 3px 5px 5px 3px;
            box-shadow: 3px 2px 8px rgba(0,0,0,.5), -1px 0 2px rgba(0,0,0,.2), inset -2px 0 4px rgba(0,0,0,.15);
            border-left: 2px solid rgba(255,255,255,.06);
        }
        .spine-emoji {
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 3px 5px 5px 3px;
            box-shadow: 3px 2px 8px rgba(0,0,0,.5), -1px 0 2px rgba(0,0,0,.2);
            border-left: 2px solid rgba(255,255,255,.06);
            font-size: 1.4rem;
        }
        .spine-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: rgba(0,0,0,.3);
            border-radius: 0 0 5px 3px;
            overflow: hidden;
        }
        .spine-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--green), var(--teal));
            transition: width 0.4s;
        }
        .spine-title {
            position: absolute;
            bottom: -22px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.55rem;
            color: var(--dim);
            white-space: nowrap;
            max-width: 70px;
            overflow: hidden;
            text-overflow: ellipsis;
            font-family: -apple-system, sans-serif;
            text-align: center;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .spine:hover .spine-title { opacity: 1; }
        /* NOURISH-STYLE COLLAPSIBLE PILLS */
        .rc-pill{margin-bottom:0.6rem;border-radius:14px;overflow:hidden;border:1px solid var(--border);}
        .rc-pill-bar{display:flex;align-items:center;gap:8px;padding:10px 14px;cursor:pointer;transition:opacity .12s;}
        .rc-pill-bar:active{opacity:.85;}
        .rc-pill-icon{font-size:15px;}

// Sound effects
var audioCtx = null;
function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
}
function playSound(type) {
    if (!SOUND_ENABLED) return;
    initAudio();
    var now = audioCtx.currentTime;
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    if (type === 'correct') {
        osc.frequency.setValueAtTime(800, now);
        osc.frequency.setValueAtTime(1000, now + 0.1);
        gain.gain.setValueAtTime(0.3, now);
        gain.gain.setValueAtTime(0, now + 0.2);
        osc.start(now);
        osc.stop(now + 0.2);
    } else if (type === 'incorrect') {
        osc.frequency.setValueAtTime(300, now);
        osc.frequency.setValueAtTime(200, now + 0.2);
        gain.gain.setValueAtTime(0.3, now);
        gain.gain.setValueAtTime(0, now + 0.2);
        osc.start(now);
        osc.stop(now + 0.2);
    } else if (type === 'complete') {
        var freqs = [500, 630, 800];
        for (var i = 0; i < freqs.length; i++) {
            var osc2 = audioCtx.createOscillator();
            var gain2 = audioCtx.createGain();
            osc2.connect(gain2);
            gain2.connect(audioCtx.destination);
            osc2.frequency.setValueAtTime(freqs[i], now + i * 0.15);
            gain2.gain.setValueAtTime(0.2, now + i * 0.15);
            gain2.gain.setValueAtTime(0, now + i * 0.15 + 0.2);
            osc2.start(now + i * 0.15);
            osc2.stop(now + i * 0.15 + 0.2);
        }
    }
}

// SHELF VIEW — Visual Bookshelf
function renderShelf() {
    var books = getBooks();
    var reading = books.filter(function(b) { return b.status === 'reading'; });
    var toRead = books.filter(function(b) { return b.status === 'to-read'; });
    var done = books.filter(function(b) { return b.status === 'done'; });
    var dnf = books.filter(function(b) { return b.status === 'dnf'; });
    var html = '';

    // Add Book button
    html += '<div style="padding:0.5rem 0.8rem;"><button class="btn" onclick="openAddBookForm()" style="width:100%;">+ Add Book</button></div>';

    // Currently Reading shelf
    if (reading.length > 0) {
        html += '<div class="shelf-label">Currently Reading</div>';
        html += '<div class="shelf-row">';
        reading.forEach(function(book) { html += buildSpine(book, 120); });
        html += '</div>';
        html += '<div class="shelf-plank"></div>';
    }

    // To Read shelf
    if (toRead.length > 0) {
        html += '<div class="shelf-label" style="margin-top:0.3rem;">Up Next</div>';
        html += '<div class="shelf-row">';
        toRead.forEach(function(book) { html += buildSpine(book, 100); });
        html += '</div>';
        html += '<div class="shelf-plank"></div>';
    }

    // Finished shelf
    if (done.length > 0) {
        html += '<div class="shelf-label" style="margin-top:0.3rem;">Finished</div>';
        html += '<div class="shelf-row">';
        done.forEach(function(book) { html += buildSpine(book, 100); });
        html += '</div>';
        html += '<div class="shelf-plank"></div>';
    }

    // DNF shelf
    if (dnf.length > 0) {
        html += '<div class="shelf-label" style="margin-top:0.3rem;">Set Aside</div>';
        html += '<div class="shelf-row" style="min-height:100px;">';
        dnf.forEach(function(book) { html += buildSpine(book, 80); });
        html += '</div>';
        html += '<div class="shelf-plank"></div>';
    }

    // Reading stats summary (Nourish-style stat chip row)
    var totalPages = 0;
    var pagesRead = 0;
    books.forEach(function(b) { totalPages += (b.pages || 0); pagesRead += (b.pagesRead || 0); });
    html += '<div class="rc-stat-row" style="padding:0.5rem 0.8rem;">';
    html += '<div class="rc-stat-chip"><div class="rc-stat-val" style="color:var(--accent-bright);">' + books.length + '</div><div class="rc-stat-lbl">Books</div></div>';
    html += '<div class="rc-stat-chip"><div class="rc-stat-val" style="color:var(--green);">' + pagesRead + '</div><div class="rc-stat-lbl">Pages read</div></div>';
    html += '<div class="rc-stat-chip"><div class="rc-stat-val" style="color:var(--teal);">' + done.length + '</div><div class="rc-stat-lbl">Finished</div></div>';
    html += '<div class="rc-stat-chip"><div class="rc-stat-val" style="color:var(--gold);">' + reading.length + '</div><div class="rc-stat-lbl">Reading</div></div>';
    html += '</div>';

    document.getElementById('books-container').innerHTML = html;
}

function buildSpine(book, height) {
    var w = Math.round(height * 0.65);
    var progress = book.pages > 0 ? Math.round((book.pagesRead / book.pages) * 100) : 0;
    var spineColors = ['#8b4513','#2a1a0e','#1a3a2a','#1a1a3a','#3a1a1a','#2e1a3a'];
    var bgColor = spineColors[book.id % spineColors.length];

    var html = '<div class="spine" onclick="viewBookDetail(' + book.id + ')" style="width:' + w + 'px;">';
    if (book.coverUrl) {
        html += '<img src="' + book.coverUrl + '" width="' + w + '" height="' + height + '" alt="' + book.title + '" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">';
        html += '<div class="spine-emoji" style="display:none;width:' + w + 'px;height:' + height + 'px;background:' + bgColor + ';">' + book.emoji + '</div>';
    } else {
        html += '<div class="spine-emoji" style="width:' + w + 'px;height:' + height + 'px;background:' + bgColor + ';">' + book.emoji + '</div>';
    }
    // Progress bar on bottom of spine
    if (book.status === 'reading' && progress > 0 && progress < 100) {
        html += '<div class="spine-progress"><div class="spine-progress-fill" style="width:' + progress + '%"></div></div>';
    }
    html += '<div class="spine-glow"></div>';
    html += '<div class="spine-title">' + book.title.split(':')[0] + '</div>';
    html += '</div>';
    return html;
}

function viewBookDetail(bookId) {
    var books = getBooks();
    var book = books.find(function(b) { return b.id === bookId; });
    if (!book) return;

    CURRENT_BOOK_DETAIL = book.id;
    var entries = getEntries().filter(function(e) { return e.bookId === bookId; });
    var progress = book.pages > 0 ? Math.round((book.pagesRead / book.pages) * 100) : 0;
    var remaining = Math.max(0, (book.pages || 0) - (book.pagesRead || 0));
    var targets = JSON.parse(localStorage.getItem('rc_targets') || '{}');
    var targetDays = targets[book.id] || 30;
    var ppd = remaining > 0 ? Math.ceil(remaining / targetDays) : 0;
    var minsPerDay = Math.round(ppd * 1.5);
    var paceColor = ppd <= 15 ? 'var(--green)' : ppd <= 30 ? 'var(--gold)' : 'var(--red)';

    var html = '<button class="back-button" onclick="CURRENT_BOOK_DETAIL = null; renderShelf();" style="margin-bottom:0.4rem;">← Back to Shelf</button>';

    // Cover + title header
    html += '<div style="display:flex;gap:1rem;align-items:flex-start;margin-bottom:0.8rem;">';
    html += '<div class="detail-cover">';
    if (book.coverUrl) {
        html += '<img src="' + book.coverUrl + '" alt="' + book.title + '" onerror="this.style.display=\'none\';this.parentNode.insertAdjacentHTML(\'beforeend\',\'' + book.emoji + '\')">';
    } else {
        html += book.emoji;
    }
    html += '</div>';
    html += '<div style="flex:1;">';
    html += '<h2 style="font-size:1.15rem;font-family:Georgia,serif;margin-bottom:0.2rem;">' + book.title + '</h2>';
    html += '<div style="font-size:0.85rem;color:var(--accent);font-style:italic;margin-bottom:0.3rem;">' + book.author + '</div>';
    html += '<span class="status-pill ' + book.status + '">' + book.status.replace('-', ' ') + '</span>';
    html += '<div style="font-size:0.78rem;color:var(--dim);margin-top:0.3rem;line-height:1.5;">' + book.description + '</div>';
    html += '</div></div>';

    // Big progress bar
    html += '<div class="big-progress">';
    html += '<div class="big-progress-fill" style="width:' + progress + '%"></div>';
    html += '<div class="big-progress-text">' + progress + '% complete</div>';
    html += '</div>';

    // Stats grid
    html += '<div class="detail-stats">';
    html += '<div class="detail-stat"><div class="detail-stat-num" style="color:var(--accent-bright);">' + book.pagesRead + '</div><div class="detail-stat-label">Pages Read</div></div>';
    html += '<div class="detail-stat"><div class="detail-stat-num" style="color:var(--dim);">' + remaining + '</div><div class="detail-stat-label">Remaining</div></div>';
    html += '<div class="detail-stat"><div class="detail-stat-num" style="color:var(--teal);">' + (book.pages || '?') + '</div><div class="detail-stat-label">Total Pages</div></div>';
    html += '</div>';

    // Pace section (only for reading)
    if (book.status === 'reading' && remaining > 0) {
        html += '<div style="background:rgba(212,165,116,.04);border:1px solid var(--border-warm);border-radius:12px;padding:0.7rem;margin-bottom:0.8rem;">';
        html += '<div style="font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--accent);font-family:-apple-system,sans-serif;margin-bottom:0.4rem;">Reading Pace</div>';
        html += '<div style="display:flex;align-items:center;gap:0.4rem;margin-bottom:0.3rem;">';
        html += '<span style="font-size:0.72rem;color:var(--dim);font-family:-apple-system,sans-serif;">Finish in</span>';
        html += '<input type="number" value="' + targetDays + '" min="1" max="365" style="width:48px;padding:0.2rem;font-size:0.78rem;text-align:center;border-radius:6px;" onchange="setPaceTarget(' + book.id + ',this.value);viewBookDetail(' + book.id + ')">';
        html += '<span style="font-size:0.72rem;color:var(--dim);font-family:-apple-system,sans-serif;">days</span>';
        html += '</div>';
        html += '<div style="display:flex;gap:1rem;">';
        html += '<div style="font-size:0.88rem;font-weight:700;color:' + paceColor + ';font-family:-apple-system,sans-serif;">' + ppd + ' pages/day</div>';
        html += '<div style="font-size:0.82rem;color:var(--dim);font-family:-apple-system,sans-serif;">~' + minsPerDay + ' min/day</div>';
        html += '</div></div>';
    }

    // Update controls
    html += '<div style="display:flex;gap:0.5rem;margin-bottom:1rem;">';
    html += '<input type="number" id="pages-input" placeholder="Pages read" value="' + book.pagesRead + '" min="0" max="' + (book.pages || 9999) + '" style="flex:1;font-size:0.88rem;">';
    html += '<button class="btn btn-small" onclick="updatePages(' + bookId + ')">Update</button>';
    html += '<button class="btn btn-secondary btn-small" onclick="changeStatus(' + bookId + ')">Status</button>';
    html += '</div>';

    // Reading timer (only for books being read)
    if (book.status === 'reading') {
        html += buildTimerWidget(bookId);
    }

    // Journal entries for this book
    var chapterEntries = entries.filter(function(e) { return e.type === 'chapter'; }).sort(function(a, b) { return (a.chapter || 0) - (b.chapter || 0); });
    var otherEntries = entries.filter(function(e) { return e.type !== 'chapter'; });

    if (chapterEntries.length > 0) {
        html += '<h3 class="section-title">Chapter Notes (' + chapterEntries.length + ')</h3>';
        chapterEntries.forEach(function(e) {
            html += '<div style="border-left:3px solid var(--teal);padding-left:0.6rem;margin-bottom:0.5rem;">';
            html += '<div style="font-size:0.65rem;font-weight:700;color:var(--teal);font-family:-apple-system,sans-serif;">CHAPTER ' + (e.chapter || '?') + '</div>';
            html += '<div style="font-size:0.82rem;line-height:1.55;font-family:Georgia,serif;">' + e.text + '</div>';
            html += '</div>';
        });
    }

    html += '<h3 class="section-title">Reflections (' + otherEntries.length + ')</h3>';
    if (otherEntries.length > 0) {
        otherEntries.forEach(function(e) {
            var icon = e.type === 'reflection' ? '💭' : e.type === 'quote' ? '❝' : e.type === 'vocab' ? '📚' : e.type === 'booksummary' ? '📕' : '🏷';
            html += '<div class="entry-card">';
            html += '<div class="entry-meta">' + icon + ' ' + e.type.toUpperCase() + ' • ' + new Date(e.date).toLocaleDateString() + '</div>';
            if (e.type === 'quote') {
                html += '<div class="quote-text">"' + e.text + '"</div>';
            } else {
                html += '<div class="entry-text">' + e.text + '</div>';
            }
            html += '</div>';
        });
    } else {
        html += '<p style="color:var(--dim);font-size:0.85rem;">No reflections yet. Add one from the Journal tab.</p>';
    }

    // Quick add entry button
    html += '<button class="btn btn-secondary" onclick="switchView(\'journal\')" style="width:100%;margin-top:0.5rem;">✍️ Add Journal Entry</button>';

    document.getElementById('shelf-view').innerHTML = html;
}

function updatePages(bookId) {
    var newPages = parseInt(document.getElementById('pages-input').value);
    var books = getBooks();
    var book = books.find(function(b) { return b.id === bookId; });
    if (book && newPages >= 0 && newPages <= book.pages) {
        book.pagesRead = newPages;
        if (newPages >= book.pages && book.status === 'reading') {
            book.status = 'done';
            syncToCC('book_finished', {title: book.title, pages: book.pages});
            playSound('complete');
            emojiBurst(['📚', '🎉', '✅', '🌟']);
        } else {
            playSound('correct');
        }
        saveBooks(books);
        syncToCC('pages_updated', {title: book.title, pages: newPages, total: book.pages});
        viewBookDetail(bookId);
    }
}

function changeStatus(bookId) {
    var books = getBooks();
    var book = books.find(function(b) { return b.id === bookId; });
    if (!book) return;

    var statuses = ['to-read', 'reading', 'done', 'dnf'];
    var currentIdx = statuses.indexOf(book.status);
    book.status = statuses[(currentIdx + 1) % statuses.length];
    saveBooks(books);
    viewBookDetail(bookId);
}

function openAddBookForm() {
    var html = '<h2>Add Book</h2>';
    html += '<div class="form-group"><label>Title</label><input type="text" id="book-title" placeholder="Enter title"></div>';
    html += '<div class="form-group"><label>Author</label><input type="text" id="book-author" placeholder="Enter author"></div>';
    html += '<div class="form-group"><label>ISBN</label><input type="text" id="book-isbn" placeholder="Enter ISBN"></div>';
    html += '<div class="form-group"><label>Total Pages</label><input type="number" id="book-pages" placeholder="Enter page count" value="300"></div>';
    html += '<button class="btn" onclick="addBook()" style="width:100%;">Add Book</button>';
    openModal(html);
}

function addBook() {
    var title = document.getElementById('book-title').value;
    var author = document.getElementById('book-author').value;
    var isbn = document.getElementById('book-isbn').value;
    var pages = parseInt(document.getElementById('book-pages').value);

    if (!title || !author) return;

    var books = getBooks();
    var newBook = {
        id: Math.max.apply(null, books.map(function(b) { return b.id; })) + 1,
        title: title,
        author: author,
        isbn: isbn,
        pages: pages || 300,
        pagesRead: 0,
        status: 'to-read',
        description: 'New book',
        emoji: '📖',
        coverUrl: null
    };
    books.push(newBook);
    saveBooks(books);
    playSound('complete');
    closeModal();
    renderShelf();
}

// JOURNAL VIEW
function renderJournal() {
    var entries = getEntries();
    var books = getBooks();

    // Themes
    var themes = {};
    entries.filter(function(e) { return e.type === 'theme'; }).forEach(function(e) {
        themes[e.text] = (themes[e.text] || 0) + 1;
    });
    var themesSorted = Object.keys(themes).sort(function(a, b) { return themes[b] - themes[a]; });

    var html = '<h3 class="section-title">Themes I\'m Tracking (' + themesSorted.length + ')</h3>';
    if (themesSorted.length > 0) {
        html += '<div style="display:flex;flex-wrap:wrap;gap:0.6rem;margin-bottom:1rem;">';
        themesSorted.forEach(function(theme) {
            html += '<span class="status-pill to-read" style="background:rgba(167,139,250,0.2);color:var(--accent);">' + theme + '</span>';
        });
        html += '</div>';
    } else {
        html += '<p style="color:var(--dim);margin-bottom:1rem;">Log theme entries to track recurring ideas.</p>';
    }

    // Vocabulary
    var words = entries.filter(function(e) { return e.type === 'vocab'; });
    html += '<h3 class="section-title">Vocabulary (' + words.length + ')</h3>';
    if (words.length > 0) {
        words.slice(-5).forEach(function(word) {
            html += '<div class="word-card">';
            html += '<div class="word-term">' + word.text + '</div>';
            html += '<div class="word-definition">' + (word.definition || 'Add definition...') + '</div>';
            html += '</div>';
        });
    } else {
        html += '<p style="color:var(--dim);margin-bottom:1rem;">Log vocabulary words as you encounter them.</p>';
    }

    // Chapter Summaries
    var chapters = entries.filter(function(e) { return e.type === 'chapter'; });
    html += '<h3 class="section-title">Chapter Summaries (' + chapters.length + ')</h3>';
    if (chapters.length > 0) {
        var chaptersByBook = {};
        chapters.forEach(function(e) {
            if (!chaptersByBook[e.bookId]) chaptersByBook[e.bookId] = [];
            chaptersByBook[e.bookId].push(e);
        });
        Object.keys(chaptersByBook).forEach(function(bid) {
            var book = books.find(function(b) { return b.id === parseInt(bid); });
            var bChaps = chaptersByBook[bid].sort(function(a, b) { return (a.chapter || 0) - (b.chapter || 0); });
            html += '<div style="background:rgba(34,211,238,0.05);border:1px solid rgba(34,211,238,0.15);border-radius:12px;padding:0.6rem;margin-bottom:0.6rem;">';
            html += '<div style="font-size:0.8rem;font-weight:800;color:#22d3ee;margin-bottom:0.4rem;">📖 ' + (book ? book.title : 'Unknown') + '</div>';
            bChaps.forEach(function(ch) {
                html += '<div style="border-left:3px solid rgba(34,211,238,0.3);padding-left:0.5rem;margin-bottom:0.4rem;">';
                html += '<div style="font-size:0.68rem;font-weight:700;color:var(--gold);">Chapter ' + (ch.chapter || '?') + '</div>';
                html += '<div style="font-size:0.78rem;color:var(--text);line-height:1.45;">' + ch.text + '</div>';
                html += '</div>';
            });
            html += '</div>';
        });
    } else {
        html += '<p style="color:var(--dim);margin-bottom:1rem;">Add chapter summaries as you read to track your journey through each book.</p>';
    }

    // Book Summaries
    var bookSums = entries.filter(function(e) { return e.type === 'booksummary'; });
    html += '<h3 class="section-title">Book Summaries (' + bookSums.length + ')</h3>';
    if (bookSums.length > 0) {
        bookSums.forEach(function(e) {
            var book = books.find(function(b) { return b.id === e.bookId; });
            html += '<div style="background:rgba(240,192,64,.04);border:1px solid rgba(240,192,64,.2);border-left:4px solid var(--gold);border-radius:0 12px 12px 0;padding:0.7rem;margin-bottom:0.6rem;">';
            html += '<div style="font-size:0.82rem;font-weight:800;color:var(--gold);margin-bottom:0.3rem;">📕 ' + (book ? book.title : 'Unknown') + '</div>';
            html += '<div style="font-size:0.82rem;color:var(--text);line-height:1.55;font-family:Georgia,serif;">' + e.text + '</div>';
            html += '<div style="font-size:0.62rem;color:var(--dim);margin-top:0.3rem;font-family:-apple-system,sans-serif;">' + new Date(e.date).toLocaleDateString() + '</div>';
            html += '</div>';
        });
    } else {
        html += '<p style="color:var(--dim);margin-bottom:1rem;">Finish a book and write your overall take.</p>';
    }

    // All entries
    html += '<h3 class="section-title">All Entries (' + entries.length + ')</h3>';
    entries.slice().reverse().forEach(function(e) {
        var book = books.find(function(b) { return b.id === e.bookId; });
        var icon = e.type === 'reflection' ? '💭' : e.type === 'quote' ? '❝' : e.type === 'vocab' ? '📚' : e.type === 'chapter' ? '📖' : e.type === 'booksummary' ? '📕' : '🏷';
        html += '<div class="entry-card">';
        var chLabel = e.type === 'chapter' && e.chapter ? ' (Ch. ' + e.chapter + ')' : '';
        var typeLabel = e.type === 'booksummary' ? 'BOOK SUMMARY' : e.type.toUpperCase();
        html += '<div class="entry-meta">' + icon + ' ' + typeLabel + chLabel + ' from <strong>' + (book ? book.title : 'Unknown') + '</strong> • ' + new Date(e.date).toLocaleDateString() + '</div>';
        if (e.type === 'quote') {
            html += '<div class="quote-text">"' + e.text + '"</div>';
        } else {
            html += '<div class="entry-text">' + e.text + '</div>';
        }
        html += '</div>';
    });

    document.getElementById('journal-view').innerHTML = html;
}

    html += '</select></div>';
    html += '<div class="form-group" id="chapter-group" style="display:none;"><label>Chapter Number</label><input type="number" id="entry-chapter" min="1" placeholder="e.g. 3"></div>';
    html += '<div id="journal-prompt" style="background:rgba(212,165,116,.06);border:1px solid var(--border-warm);border-radius:10px;padding:0.6rem;margin-bottom:0.8rem;font-size:0.78rem;color:var(--accent);font-style:italic;font-family:Georgia,serif;display:none;"></div>';
    html += '<div class="form-group"><label>Entry</label><textarea id="entry-text" placeholder="What did you think?"></textarea></div>';
    html += '<div class="form-group" id="definition-group" style="display:none;"><label>Definition</label><input type="text" id="entry-definition" placeholder="Enter definition"></div>';
    html += '<button class="btn" onclick="addEntry()" style="width:100%;">Save Entry</button>';

    openModal(html);

    document.getElementById('entry-type').addEventListener('change', function() {
        document.getElementById('definition-group').style.display = this.value === 'vocab' ? 'block' : 'none';
        document.getElementById('chapter-group').style.display = (this.value === 'chapter') ? 'block' : 'none';
        var ta = document.getElementById('entry-text');
        var prompt = document.getElementById('journal-prompt');
        var prompts = {
            reflection: ['What surprised you?', 'What would you tell someone who asked about this book?', 'Did anything challenge what you already believed?', 'What made you stop and think?', 'How does this connect to your own experience?'],
            quote: ['What line made you pause?', 'Which sentence would you underline twice?'],
            vocab: ['What new word or concept did you encounter?'],
            theme: ['What pattern keeps showing up across your reading?', 'What big idea is the author circling around?'],
            chapter: ['What was the main argument of this chapter?', 'If you had to summarize this chapter in one sentence for a friend, what would you say?', 'What question does this chapter raise for the next?'],
            booksummary: ['In 3 sentences, what is this book really about?', 'What is the one idea from this book you will carry forward?', 'Who should read this, and why?', 'How did this book change how you think about something?']
        };
        var pList = prompts[this.value] || prompts.reflection;
        var picked = pList[Math.floor(Math.random() * pList.length)];
        prompt.style.display = 'block';
        prompt.textContent = '💡 ' + picked;

        if (this.value === 'chapter') ta.placeholder = 'Summarize this chapter...';
        else if (this.value === 'booksummary') ta.placeholder = 'Your overall take on this book...';
        else if (this.value === 'quote') ta.placeholder = 'Enter the quote...';
        else if (this.value === 'vocab') ta.placeholder = 'Enter the word or phrase...';
        else if (this.value === 'theme') ta.placeholder = 'Name the theme...';
        else ta.placeholder = 'What did you think?';
    });
    // Show initial prompt
    document.getElementById('entry-type').dispatchEvent(new Event('change'));
}

function addEntry() {
    var bookId = parseInt(document.getElementById('entry-book').value);
    var type = document.getElementById('entry-type').value;
    var text = document.getElementById('entry-text').value;
    var definition = document.getElementById('entry-definition').value;
    var chapterNum = document.getElementById('entry-chapter') ? parseInt(document.getElementById('entry-chapter').value) || null : null;

    if (!text) return;

    var entries = getEntries();
    entries.push({
        id: entries.length + 1,
        bookId: bookId,
        type: type,
        text: text,
        definition: definition || null,
        chapter: chapterNum,
        date: new Date().toISOString()
    });
    saveEntries(entries);
    var bookName = '';
    var books = getBooks();
    var matchBook = books.find(function(b) { return b.id === bookId; });
    if (matchBook) bookName = matchBook.title;
    syncToCC('journal_entry', {type: type, book: bookName, text: text.substring(0, 80)});
    playSound('complete');
    closeModal();
    renderJournal();
}

// Add a suggested book to shelf
function addSuggestionToShelf(title, author) {
    var books = getBooks();
    var exists = books.find(function(b) { return b.title === title; });
    if (exists) { showToast('Already on your shelf!'); return; }
    var newBook = {
        id: Date.now(),
        title: title,
        author: author,
        isbn: '',
        totalPages: 0,
        pagesRead: 0,
        status: 'to-read',
        dateAdded: new Date().toISOString().split('T')[0],
        coverUrl: ''
    };
    books.push(newBook);
    localStorage.setItem('rc_books', JSON.stringify(books));
    sfxCorrect();
    showToast('📚 Added "' + title + '" to your shelf!');
    renderDiscover();
}

function startGame(gameId) {
    CURRENT_GAME = gameId;

    if (gameId === 1) playThemeDetective();

}

    html += '<div class="question-box">';

    html += '<div style="font-size:0.9rem;color:var(--dim);margin-top:0.5rem;">Which theme does this reflect?</div>';

function playSpeedRecap() {
    if (GAME_STATE.current === 0) {
        GAME_STATE.total = 60;
        GAME_STATE.timeLeft = 60;
        GAME_STATE.selected = [];
    }

    var books = getBooks();
    var readingBooks = books.filter(function(b) { return b.status === 'reading' || b.status === 'done'; });
    if (readingBooks.length === 0) {
        var html = '<div style="text-align:center;padding:2rem;"><p>Start reading to unlock this game!</p><button class="btn" onclick="CURRENT_GAME=null;renderGames();">Back</button></div>';
        document.getElementById('games-view').innerHTML = '<div class="view-container">' + html + '</div>';
        return;
    }

    var book = readingBooks[Math.floor(Math.random() * readingBooks.length)];
    var entries = getEntries().filter(function(e) { return e.bookId === book.id && (e.type === 'reflection' || e.type === 'theme'); });

    var correctPoints = entries.slice(0, 3);
    var distractors = entries.slice(3, 6);
    var allOptions = correctPoints.concat(distractors).sort(function() { return Math.random() - 0.5; });

    var html = '<button class="back-button" onclick="CURRENT_GAME=null;renderGames();">← Back</button>';
    html += '<div style="text-align:center;margin-bottom:1rem;">';
    html += '<div style="font-size:1.2rem;font-weight:700;color:var(--gold);">⏱ ' + GAME_STATE.timeLeft + 's</div>';
    html += '<div style="font-size:0.9rem;color:var(--dim);">Key takeaways from ' + book.title + '?</div>';
    html += '</div>';
    html += '<div class="options">';
    if (allOptions.length === 0) {
        html += '<p style="color:var(--dim);">Log reflections about this book first!</p>';
    }
    allOptions.forEach(function(opt, idx) {
        var isSelected = GAME_STATE.selected.indexOf(idx) > -1;
        html += '<button class="option-btn' + (isSelected ? ' correct' : '') + '" onclick="toggleRecapOption(' + idx + ',' + correctPoints.length + ')" style="border:2px solid ' + (isSelected ? 'var(--green)' : 'var(--border)') + ';">';
        html += (isSelected ? '✓ ' : '') + opt.text;
        html += '</button>';
    });
    html += '</div>';
    html += '<button class="btn" onclick="finishSpeedRecap(' + allOptions.length + ')" style="width:100%;margin-top:1rem;">Submit</button>';

    document.getElementById('games-view').innerHTML = '<div class="view-container">' + html + '</div>';

    if (GAME_STATE.current === 0) {
        GAME_STATE.current = 1;
        var timer = setInterval(function() {
            GAME_STATE.timeLeft--;
            if (GAME_STATE.timeLeft <= 0) {
                clearInterval(timer);
                finishSpeedRecap(allOptions.length);
            }
        }, 1000);
    }
}

function toggleRecapOption(idx, correctCount) {
    var selectedIdx = GAME_STATE.selected.indexOf(idx);
    if (selectedIdx > -1) {
        GAME_STATE.selected.splice(selectedIdx, 1);
    } else {
        GAME_STATE.selected.push(idx);
    }
    playSpeedRecap();
}

function finishSpeedRecap(total) {
    var correctSelected = GAME_STATE.selected.length <= 3 ? GAME_STATE.selected.length : 0;
    GAME_STATE.score = correctSelected * 15;
    showGameComplete('Speed Recap', GAME_STATE.score, 5);
}

function showGameComplete(gameName, score, gameId) {
    var stats = getStats();
    stats.xp += score;
    stats.level = Math.floor(stats.xp / 100) + 1;
    saveStats(stats);

    var html = '<div style="text-align:center;padding:2rem;">';
    html += '<div class="achievement">✅ Game Complete!</div>';
    html += '<div style="font-size:2rem;margin:1rem 0;">' + gameName + '</div>';
    html += '<div style="font-size:1.5rem;color:var(--gold);margin:1rem 0;"><span class="xp-badge">' + score + ' XP</span></div>';
    html += '<p style="color:var(--dim);margin-bottom:1.5rem;">Total XP: ' + stats.xp + ' | Level: ' + stats.level + '</p>';
    html += '<button class="btn" onclick="CURRENT_GAME=null;renderGames();" style="width:100%;">Play Again</button>';
    html += '<button class="btn btn-secondary" onclick="switchView(\'stats\')" style="width:100%;margin-top:0.6rem;">View Stats</button>';
    html += '</div>';

    document.getElementById('games-view').innerHTML = '<div class="view-container">' + html + '</div>';
    playSound('complete');
    emojiBurst(['🎉', '🏆', '⭐', '✨']);
}

// STATS VIEW
function renderStats() {
    var books = getBooks();
    var entries = getEntries();
    var stats = getStats();

    var reading = books.filter(function(b) { return b.status === 'reading'; }).length;
    var done = books.filter(function(b) { return b.status === 'done'; }).length;
    var totalPages = books.reduce(function(sum, b) { return sum + b.pagesRead; }, 0);
    var vocabCount = entries.filter(function(e) { return e.type === 'vocab'; }).length;
    var entryCount = entries.length;
    var sessions = getReadingSessions();
    var totalReadTime = sessions.reduce(function(sum, s) { return sum + s.duration; }, 0);
    var totalSessionPages = sessions.reduce(function(sum, s) { return sum + (s.pagesRead || 0); }, 0);
    var avgPpm = totalReadTime > 60 && totalSessionPages > 0 ? (totalSessionPages / (totalReadTime / 60)).toFixed(1) : '0';

    var html = '';

    // Top stat chip row (always visible)
    html += '<div class="rc-stat-row" style="margin-top:0.5rem;">';

    html += '<div class="rc-stat-chip"><div class="rc-stat-val" style="color:var(--green);">' + totalPages + '</div><div class="rc-stat-lbl">Pages</div></div>';
    html += '<div class="rc-stat-chip"><div class="rc-stat-val" style="color:var(--teal);">' + done + '</div><div class="rc-stat-lbl">Finished</div></div>';
    html += '<div class="rc-stat-chip"><div class="rc-stat-val" style="color:var(--gold);">' + stats.xp + '</div><div class="rc-stat-lbl">XP</div></div>';
    html += '</div>';

    // Library pill

    html += '<span class="rc-pill-icon">📚</span><span class="rc-pill-title">Library</span>';
    html += '<span class="rc-pill-summary">' + reading + ' reading, ' + done + ' done</span>';
    html += '<span class="rc-pill-arrow">▼</span></div>';
    html += '<div class="rc-pill-body">';
    html += '<div class="rc-stat-row" style="margin-top:0.5rem;">';
    html += '<div class="rc-stat-chip"><div class="rc-stat-val" style="color:var(--green);">' + reading + '</div><div class="rc-stat-lbl">Reading</div></div>';
    html += '<div class="rc-stat-chip"><div class="rc-stat-val" style="color:var(--teal);">' + done + '</div><div class="rc-stat-lbl">Done</div></div>';
    html += '<div class="rc-stat-chip"><div class="rc-stat-val" style="color:var(--accent);">' + books.filter(function(b){return b.status==='to-read';}).length + '</div><div class="rc-stat-lbl">TBR</div></div>';
    html += '</div>';

    if (readingBooks.length > 0) {

    html += '<div class="rc-stat-row" style="margin-top:0.5rem;">';
    html += '<div class="rc-stat-chip"><div class="rc-stat-val" style="color:var(--accent-bright);">' + entryCount + '</div><div class="rc-stat-lbl">Entries</div></div>';
    html += '<div class="rc-stat-chip"><div class="rc-stat-val" style="color:var(--gold);">' + vocabCount + '</div><div class="rc-stat-lbl">Words</div></div>';

    html += '<div class="rc-stat-row" style="margin-top:0.5rem;">';
    html += '<div class="rc-stat-chip"><div class="rc-stat-val" style="color:var(--teal);">' + sessions.length + '</div><div class="rc-stat-lbl">Sessions</div></div>';

    html += '<div class="rc-pill" id="stats-pill-games">';

    html += '<div class="rc-pill-body">';
    html += '<div class="rc-stat-row" style="margin-top:0.5rem;">';
    html += '<div class="rc-stat-chip"><div class="rc-stat-val" style="color:var(--gold);">' + stats.xp + '</div><div class="rc-stat-lbl">Total XP</div></div>';
    html += '<div class="rc-stat-chip"><div class="rc-stat-val" style="color:var(--accent-bright);">' + stats.level + '</div><div class="rc-stat-lbl">Level</div></div>';

    document.getElementById('stats-view').innerHTML = '<div class="view-container">' + html + '</div>';
    restoreRcPills();
}

// PLANNER VIEW
function renderPlanner() {
    var books = getBooks();
    var reading = books.filter(function(b) { return b.status === 'reading'; });
    var toRead = books.filter(function(b) { return b.status === 'to-read'; });
    var html = '';

    // PACE CALCULATOR (collapsible pill)
    html += '<div class="rc-pill" id="plan-pill-pace">';
    html += '<div class="rc-pill-bar" onclick="toggleRcPill(\'plan-pill-pace\')" style="background:linear-gradient(135deg,#2a1a0e,var(--accent));">';
    html += '<span class="rc-pill-icon">🏃</span><span class="rc-pill-title">Reading pace</span>';
    html += '<span class="rc-pill-summary">' + reading.length + ' active</span>';
    html += '<span class="rc-pill-arrow">▼</span></div>';
    html += '<div class="rc-pill-body">';
    if (reading.length > 0) {
        reading.forEach(function(book) {
            var remaining = (book.pages || 0) - (book.pagesRead || 0);
            var stored = JSON.parse(localStorage.getItem('rc_targets') || '{}');
            var targetDays = stored[book.id] || 30;
            var ppd = remaining > 0 ? Math.ceil(remaining / targetDays) : 0;
            var minsPerDay = Math.round(ppd * 1.5);
            var pctDone = book.pages > 0 ? Math.round((book.pagesRead / book.pages) * 100) : 0;
            var paceColor = ppd <= 15 ? 'var(--green)' : ppd <= 30 ? 'var(--gold)' : 'var(--red)';

            html += '<div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:0.9rem;margin-bottom:0.8rem;">';
            html += '<div style="display:flex;gap:0.7rem;align-items:center;margin-bottom:0.6rem;">';
            if (book.coverUrl) {
                html += '<img src="' + book.coverUrl + '" style="width:36px;height:54px;border-radius:3px;object-fit:cover;" onerror="this.style.display=\'none\'">';
            }
            html += '<div style="flex:1;">';
            html += '<div style="font-size:0.9rem;font-weight:700;font-family:Georgia,serif;">' + book.title + '</div>';
            html += '<div style="font-size:0.72rem;color:var(--dim);">' + book.pagesRead + ' / ' + book.pages + ' pages (' + pctDone + '%)</div>';
            html += '</div></div>';

            html += '<div class="progress-bar" style="margin-bottom:0.5rem;"><div class="progress-fill" style="width:' + pctDone + '%"></div></div>';

            html += '<div style="display:flex;gap:0.4rem;align-items:center;margin-bottom:0.4rem;">';
            html += '<span style="font-size:0.72rem;color:var(--dim);font-family:-apple-system,sans-serif;">Finish in</span>';
            html += '<input type="number" value="' + targetDays + '" min="1" max="365" style="width:50px;padding:0.25rem;font-size:0.8rem;text-align:center;border-radius:6px;" onchange="setPaceTarget(' + book.id + ',this.value)">';
            html += '<span style="font-size:0.72rem;color:var(--dim);font-family:-apple-system,sans-serif;">days</span>';
            html += '</div>';

            html += '<div style="display:flex;gap:0.8rem;flex-wrap:wrap;">';
            html += '<div style="font-size:0.82rem;font-weight:700;color:' + paceColor + ';font-family:-apple-system,sans-serif;">' + ppd + ' pages/day</div>';
            html += '<div style="font-size:0.78rem;color:var(--dim);font-family:-apple-system,sans-serif;">~' + minsPerDay + ' min/day</div>';

            html += '</div>';
            html += '</div>';
        });

function filterTP(cat) {
    var cards = document.querySelectorAll('.tp-card');
    cards.forEach(function(card) {
        if (cat === 'all' || card.getAttribute('data-cat') === cat) {
            card.style.display = '';
        } else {
            card.style.display = 'none';
        }
    });
    var btns = document.querySelectorAll('.tp-filter');
    btns.forEach(function(b) { b.classList.remove('active'); b.style.background = 'transparent'; });
    if (event && event.target) { event.target.classList.add('active'); event.target.style.background = 'rgba(212,165,116,.15)'; }
}

function markTPRead(id) {
    var read = JSON.parse(localStorage.getItem('rc_tp_read') || '[]');
    var idx = read.indexOf(id);
    if (idx > -1) read.splice(idx, 1);
    else read.push(id);
    localStorage.setItem('rc_tp_read', JSON.stringify(read));
    playSound('correct');
    renderLibrary();
}

var _ttsUtterance = null;
function readAloud(tpId) {
    if (_ttsUtterance && speechSynthesis.speaking) {
        speechSynthesis.cancel();
        _ttsUtterance = null;
        return;
    }
    var tp = THINK_PIECES_RC.find(function(t) { return t.id === tpId; });
    if (!tp) return;
    _ttsUtterance = new SpeechSynthesisUtterance(tp.title + '. ' + tp.summary);
    var voices = speechSynthesis.getVoices();
    var natural = voices.find(function(v) { return v.name.indexOf('Natural') > -1 || v.name.indexOf('Premium') > -1 || v.name.indexOf('Enhanced') > -1; });
    if (!natural) natural = voices.find(function(v) { return v.lang.indexOf('en') === 0; });
    if (natural) _ttsUtterance.voice = natural;
    _ttsUtterance.rate = 0.95;
    speechSynthesis.speak(_ttsUtterance);
}

// READING TIMER
var _readTimer = {
    interval: null,
    seconds: 0,
    running: false,
    bookId: null,
    startTime: null
};

function getReadingSessions() {
    return JSON.parse(localStorage.getItem('rc_sessions') || '[]');
}

function formatTime(totalSec) {
    var h = Math.floor(totalSec / 3600);
    var m = Math.floor((totalSec % 3600) / 60);
    var s = totalSec % 60;
    if (h > 0) return h + ':' + (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
    return m + ':' + (s < 10 ? '0' : '') + s;
}

function startReadingTimer(bookId) {
    if (_readTimer.running) return;
    _readTimer.bookId = bookId;
    _readTimer.running = true;
    _readTimer.startTime = Date.now();
    _readTimer.interval = setInterval(function() {
        _readTimer.seconds++;
        var display = document.getElementById('timer-display');
        if (display) {
            display.textContent = formatTime(_readTimer.seconds);
            display.classList.add('running');
        }
    }, 1000);
    updateTimerUI();
}

function pauseReadingTimer() {
    if (!_readTimer.running) return;
    _readTimer.running = false;
    clearInterval(_readTimer.interval);
    _readTimer.interval = null;
    var display = document.getElementById('timer-display');
    if (display) display.classList.remove('running');
    updateTimerUI();
}

function stopReadingTimer() {
    if (_readTimer.seconds < 10) {
        // Too short, just reset
        resetTimer();
        return;
    }
    pauseReadingTimer();
    var duration = _readTimer.seconds;
    var bookId = _readTimer.bookId;
    var books = getBooks();
    var book = books.find(function(b) { return b.id === bookId; });

    // Save session
    var sessions = getReadingSessions();
    sessions.push({
        bookId: bookId,
        bookTitle: book ? book.title : 'Unknown',
        duration: duration,
        date: new Date().toISOString(),
        pagesStart: book ? book.pagesRead : 0
    });
    localStorage.setItem('rc_sessions', JSON.stringify(sessions));

    // CC sync
    syncToCC('reading_session', {
        book: book ? book.title : 'Unknown',
        duration: duration,
        minutes: Math.round(duration / 60)
    });

    playSound('complete');
    emojiBurst(['📖', '⏱️', '✨', '🔥']);

    // Prompt for pages read
    var minStr = Math.round(duration / 60);
    showPagePrompt(bookId, minStr);

    resetTimer();
}

function resetTimer() {
    clearInterval(_readTimer.interval);
    _readTimer = {interval: null, seconds: 0, running: false, bookId: null, startTime: null};
    var display = document.getElementById('timer-display');
    if (display) {
        display.textContent = '0:00';
        display.classList.remove('running');
    }
    updateTimerUI();
}

function updateTimerUI() {
    var startBtn = document.getElementById('timer-start');
    var pauseBtn = document.getElementById('timer-pause');
    var stopBtn = document.getElementById('timer-stop');
    if (!startBtn) return;
    if (_readTimer.running) {
        startBtn.style.display = 'none';
        pauseBtn.style.display = '';
        stopBtn.style.display = '';
    } else if (_readTimer.seconds > 0) {
        startBtn.style.display = '';
        startBtn.textContent = '▶ Resume';
        pauseBtn.style.display = 'none';
        stopBtn.style.display = '';
    } else {
        startBtn.style.display = '';
        startBtn.textContent = '▶ Start Reading';
        pauseBtn.style.display = 'none';
        stopBtn.style.display = 'none';
    }
}

function showPagePrompt(bookId, minutes) {
    var books = getBooks();
    var book = books.find(function(b) { return b.id === bookId; });
    if (!book) return;
    var html = '<h2 style="font-family:Georgia,serif;margin-bottom:0.5rem;">Great session!</h2>';
    html += '<div style="font-size:0.85rem;color:var(--dim);margin-bottom:1rem;font-family:-apple-system,sans-serif;">You read for <strong style="color:var(--accent-bright);">' + minutes + ' minutes</strong>.</div>';
    html += '<div class="form-group"><label>How many pages did you read?</label>';
    html += '<div style="display:flex;gap:0.4rem;align-items:center;">';
    html += '<span style="font-size:0.78rem;color:var(--dim);">From page ' + book.pagesRead + ' to</span>';
    html += '<input type="number" id="session-pages" min="' + book.pagesRead + '" max="' + (book.pages || 9999) + '" value="' + book.pagesRead + '" style="width:80px;text-align:center;">';
    html += '</div></div>';
    html += '<div style="display:flex;gap:0.5rem;">';
    html += '<button class="btn" onclick="saveSessionPages(' + bookId + ')" style="flex:1;">Save</button>';
    html += '<button class="btn btn-secondary" onclick="closeModal()" style="flex:1;">Skip</button>';
    html += '</div>';
    openModal(html);
}

function saveSessionPages(bookId) {
    var input = document.getElementById('session-pages');
    var newPages = parseInt(input.value);
    var books = getBooks();
    var book = books.find(function(b) { return b.id === bookId; });
    if (book && newPages > book.pagesRead) {
        var pagesRead = newPages - book.pagesRead;
        book.pagesRead = newPages;
        if (newPages >= book.pages && book.status === 'reading') {
            book.status = 'done';
            syncToCC('book_finished', {title: book.title, pages: book.pages});
            emojiBurst(['📚', '🎉', '✅', '🌟', '🏆']);
        }
        saveBooks(books);
        syncToCC('pages_updated', {title: book.title, pages: newPages, total: book.pages, sessionPages: pagesRead});

        // Update session with pages
        var sessions = getReadingSessions();
        if (sessions.length > 0) {
            sessions[sessions.length - 1].pagesEnd = newPages;
            sessions[sessions.length - 1].pagesRead = pagesRead;
            localStorage.setItem('rc_sessions', JSON.stringify(sessions));
        }

        showToast('📖 Logged ' + pagesRead + ' pages!');
    }
    closeModal();
    if (CURRENT_BOOK_DETAIL) viewBookDetail(bookId);
}

function buildTimerWidget(bookId) {
    var sessions = getReadingSessions().filter(function(s) { return s.bookId === bookId; });
    var totalTime = 0;
    var totalSessionPages = 0;
    sessions.forEach(function(s) {
        totalTime += s.duration;
        totalSessionPages += (s.pagesRead || 0);
    });
    var avgPpm = totalTime > 60 && totalSessionPages > 0 ? (totalSessionPages / (totalTime / 60)).toFixed(1) : null;

    var html = '<div class="timer-card">';
    html += '<div style="font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--accent);font-family:-apple-system,sans-serif;">Reading Timer</div>';

    // Show current timer state
    var currentTime = _readTimer.bookId === bookId ? _readTimer.seconds : 0;
    html += '<div class="timer-display' + (_readTimer.running && _readTimer.bookId === bookId ? ' running' : '') + '" id="timer-display">' + formatTime(currentTime) + '</div>';

    // Controls
    html += '<div class="timer-controls">';
    var isThisBook = _readTimer.bookId === bookId || !_readTimer.bookId;
    if (isThisBook) {
        html += '<button class="timer-btn timer-btn-start" id="timer-start" onclick="startReadingTimer(' + bookId + ')"' + (_readTimer.running ? ' style="display:none"' : '') + '>' + (_readTimer.seconds > 0 && _readTimer.bookId === bookId ? '▶ Resume' : '▶ Start Reading') + '</button>';
        html += '<button class="timer-btn timer-btn-pause" id="timer-pause" onclick="pauseReadingTimer()"' + (!_readTimer.running ? ' style="display:none"' : '') + '>⏸ Pause</button>';
        html += '<button class="timer-btn timer-btn-stop" id="timer-stop" onclick="stopReadingTimer()"' + (_readTimer.seconds === 0 ? ' style="display:none"' : '') + '>⏹ Done</button>';
    } else {
        html += '<div style="font-size:0.72rem;color:var(--dim);font-family:-apple-system,sans-serif;padding:0.3rem;">Timer active on another book</div>';
    }
    html += '</div>';

    // Session stats
    if (sessions.length > 0) {
        html += '<div style="display:flex;gap:0.6rem;justify-content:center;margin-top:0.6rem;">';
        html += '<div style="text-align:center;"><div style="font-size:1rem;font-weight:700;color:var(--teal);font-family:Georgia,serif;">' + sessions.length + '</div><div style="font-size:0.52rem;color:var(--dim);text-transform:uppercase;font-family:-apple-system,sans-serif;">Sessions</div></div>';
        html += '<div style="text-align:center;"><div style="font-size:1rem;font-weight:700;color:var(--gold);font-family:Georgia,serif;">' + Math.round(totalTime / 60) + 'm</div><div style="font-size:0.52rem;color:var(--dim);text-transform:uppercase;font-family:-apple-system,sans-serif;">Total Time</div></div>';
        if (avgPpm) html += '<div style="text-align:center;"><div style="font-size:1rem;font-weight:700;color:var(--green);font-family:Georgia,serif;">' + avgPpm + '</div><div style="font-size:0.52rem;color:var(--dim);text-transform:uppercase;font-family:-apple-system,sans-serif;">Pages/Min</div></div>';
        html += '</div>';

        // Recent sessions
        html += '<div class="timer-sessions">';
        html += '<div style="font-size:0.6rem;color:var(--accent);font-weight:700;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:0.3rem;font-family:-apple-system,sans-serif;">Recent Sessions</div>';
        sessions.slice(-3).reverse().forEach(function(s) {
            var d = new Date(s.date);
            var dateStr = d.toLocaleDateString(undefined, {month:'short', day:'numeric'});
            var durStr = Math.round(s.duration / 60) + ' min';
            var pgStr = s.pagesRead ? '+' + s.pagesRead + 'p' : '';
            html += '<div class="timer-session-item">';
            html += '<span style="color:var(--dim);">' + dateStr + '</span>';
            html += '<span style="color:var(--accent-bright);">' + durStr + '</span>';
            if (pgStr) html += '<span style="color:var(--green);font-weight:700;">' + pgStr + '</span>';
            html += '</div>';
        });
        html += '</div>';
    }

    html += '</div>';
    return html;
}

// ── SMART SUITE SYNC ──
var SYNC_KEY = 'smart_suite_sync';
function readSync() { try { return JSON.parse(localStorage.getItem(SYNC_KEY)) || {}; } catch(e) { return {}; } }
function writeSync(data) { var d = readSync(); var rc = d.reading || {}; Object.assign(rc, data); d.reading = rc; localStorage.setItem(SYNC_KEY, JSON.stringify(d)); }

function refreshSuiteSync() {
    var books = getBooks();
    var reading = books.filter(function(b) { return b.status === 'reading'; });
    var done = books.filter(function(b) { return b.status === 'done'; });
    var totalPages = 0;
    books.forEach(function(b) { totalPages += (b.pagesRead || 0); });
    var sessions = JSON.parse(localStorage.getItem('rc_sessions') || '[]');
    var todayStr = new Date().toISOString().split('T')[0];
    var todaySessions = sessions.filter(function(s) { return s.date && s.date.indexOf(todayStr) === 0; });
    var todayMin = 0;
    todaySessions.forEach(function(s) { todayMin += (s.duration || 0); });
    writeSync({
        currentlyReading: reading.length,
        booksFinished: done.length,
        totalPagesRead: totalPages,
        readingMinToday: Math.round(todayMin / 60),
        lastDate: todayStr
    });
    renderSyncPanel();
}

function renderSyncPanel() {
    var sync = readSync();
    var fs = sync.fitsmart || {};
    var ft = sync.focus || {};
    var nr = sync.nourish || {};
    // Subtle cross-app insights — no dedicated panel, just enrich the reading experience
}

// CC SYNC: Write events to shared localStorage for Command Center to pick up
function syncToCC(eventType, data) {
    try {
        var events = JSON.parse(localStorage.getItem('cc_app_events') || '[]');
        events.unshift({
            app: 'reading',
            type: eventType,
            data: data,
            ts: new Date().toISOString()
        });
        if (events.length > 50) events = events.slice(0, 50);
        localStorage.setItem('cc_app_events', JSON.stringify(events));
    } catch(e) {}
}

// Toast
function showToast(msg) {
    var el = document.createElement('div');
    el.className = 'toast';
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(function() { el.remove(); }, 3000);
}

// Utilities
function emojiBurst(emojis) {
    for (var i = 0; i < 8; i++) {
        var emoji = emojis[Math.floor(Math.random() * emojis.length)];
        var el = document.createElement('div');
        el.className = 'emoji-burst';
        el.textContent = emoji;
        el.style.left = Math.random() * 100 + '%';
        el.style.top = '50%';
        document.body.appendChild(el);
        setTimeout(function(elem) { elem.remove(); }, 2000, el);
    }
}

// Backfill covers from SEED_BOOKS into localStorage data
function backfillCovers() {
    var books = getBooks();
    var changed = false;
    books.forEach(function(book) {
        if (!book.coverUrl && book.isbn) {
            var seed = SEED_BOOKS.find(function(s) { return s.id === book.id; });
            if (seed && seed.coverUrl) {
                book.coverUrl = seed.coverUrl;
                changed = true;
            } else {
                book.coverUrl = 'https://covers.openlibrary.org/b/isbn/' + book.isbn + '-L.jpg';
                changed = true;
            }
        }
    });
    if (changed) saveBooks(books);
}

// Initialize
(function() {
    checkAuth();
    backfillCovers();
    var stored = localStorage.getItem('rc_view') || 'shelf';
    switchView(stored);
    refreshSuiteSync();
})();
</script>
